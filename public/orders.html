<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Orders — Bards</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --black:#0A0A0A; --white:#FAFAFA; --gray-50:#F9F9F7; --gray-100:#F2F2F0;
            --gray-200:#E4E4E2; --gray-300:#C8C8C6; --gray-400:#8A8A88; --gray-600:#4A4A48;
            --orange:#FF4F00; --red:#C8001A; --green:#16A34A; --blue:#2563EB;
            --radius:14px; --radius-sm:10px; --nav-h:60px;
        }
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        html{scroll-behavior:smooth;}
        body{font-family:'Space Grotesk',sans-serif;background:var(--gray-100);color:var(--black);overscroll-behavior:none;min-height:100vh;padding-bottom:48px;}

        /* NAV — same as all pages */
        .nav{position:fixed;top:0;left:0;right:0;z-index:200;height:var(--nav-h);display:flex;align-items:center;justify-content:space-between;padding:0 18px;background:rgba(250,250,250,.92);backdrop-filter:blur(18px) saturate(160%);-webkit-backdrop-filter:blur(18px) saturate(160%);border-bottom:1px solid var(--gray-200);}
        .nav-left{display:flex;align-items:center;gap:12px;}
        .nav-right{display:flex;align-items:center;gap:4px;}
        .brand{font-family:'Bebas Neue';font-size:21px;letter-spacing:3px;color:var(--black);text-decoration:none;}
        .icon-btn{width:36px;height:36px;border-radius:50%;background:var(--gray-100);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .18s,transform .12s;text-decoration:none;color:var(--black);}
        .icon-btn:active{background:var(--gray-200);transform:scale(.9);}
        .cart-wrap{position:relative;}
        .cart-badge{position:absolute;top:-2px;right:-2px;background:var(--orange);color:#fff;font-size:8px;font-weight:700;font-family:'DM Mono',monospace;min-width:15px;height:15px;border-radius:8px;display:none;align-items:center;justify-content:center;padding:0 3px;border:1.5px solid var(--white);}
        .page-start{height:var(--nav-h);}

        /* FILTER TABS */
        .filter-bar{position:sticky;top:var(--nav-h);z-index:90;background:rgba(250,250,250,.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--gray-200);padding:10px 0;}
        .filter-scroll{display:flex;gap:7px;padding:0 18px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
        .filter-scroll::-webkit-scrollbar{display:none;}
        .f-tab{height:32px;padding:0 13px;border:1.5px solid var(--gray-200);border-radius:30px;font-size:11px;font-weight:600;cursor:pointer;background:var(--white);color:var(--gray-600);transition:all .18s;white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:5px;font-family:'Space Grotesk',sans-serif;}
        .f-tab.on{background:var(--black);border-color:var(--black);color:#fff;}
        .f-tab:active{opacity:.7;}
        .f-cnt{font-family:'DM Mono',monospace;font-size:9px;background:rgba(0,0,0,.07);border-radius:8px;padding:1px 5px;}
        .f-tab.on .f-cnt{background:rgba(255,255,255,.18);}

        /* PAGE */
        .page{max-width:800px;margin:0 auto;padding:20px 14px 0;}
        .page-heading{display:flex;align-items:baseline;gap:10px;margin-bottom:16px;}
        .page-title{font-family:'Bebas Neue';font-size:28px;letter-spacing:3px;color:var(--black);}
        .page-count{font-family:'DM Mono',monospace;font-size:11px;color:var(--gray-400);letter-spacing:.5px;}

        /* ORDER CARD */
        .order-list{display:flex;flex-direction:column;gap:10px;}
        .order-card{background:var(--white);border:1.5px solid var(--gray-200);border-radius:var(--radius);overflow:hidden;transition:transform .18s,box-shadow .18s;cursor:pointer;}
        .order-card:active{transform:scale(.985);box-shadow:0 6px 20px rgba(0,0,0,.06);}

        .oc-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 10px;border-bottom:1px solid var(--gray-100);}
        .oc-id-wrap{display:flex;flex-direction:column;gap:2px;}
        .oc-id{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;color:var(--black);letter-spacing:.8px;}
        .oc-date{font-size:10px;color:var(--gray-400);}
        .oc-badge{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border-radius:20px;}
        .st-delivered{background:#DCFCE7;color:var(--green);}
        .st-shipped{background:#DBEAFE;color:var(--blue);}
        .st-pending{background:#FEF3C7;color:#B45309;}
        .st-cancelled{background:#FEE2E2;color:var(--red);}
        .st-paid{background:#DCFCE7;color:var(--green);}
        .st-processing{background:#EDE9FE;color:#6D28D9;}
        .st-pending_verification{background:#DBEAFE;color:#1D4ED8;}
        .st-failed{background:#FEE2E2;color:var(--red);}

        .oc-items{display:flex;padding:12px 14px 0;align-items:center;}
        .oc-thumbs{display:flex;}
        .oc-thumb{width:52px;height:52px;border-radius:9px;object-fit:cover;border:2px solid var(--white);flex-shrink:0;background:var(--gray-100);}
        .oc-thumb+.oc-thumb{margin-left:-14px;}
        .oc-more{width:52px;height:52px;border-radius:9px;background:var(--gray-100);border:2px solid var(--white);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--gray-400);margin-left:-14px;flex-shrink:0;font-family:'DM Mono',monospace;}
        .oc-summary{flex:1;min-width:0;margin-left:14px;}
        .oc-itemcount{font-size:12px;font-weight:600;color:var(--gray-600);}
        .oc-total{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;color:var(--red);margin-top:1px;}

        /* TRACK BAR */
        .oc-track{padding:12px 14px 0;}
        .track-rail{display:flex;align-items:center;}
        .t-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;position:relative;z-index:1;}
        .t-dot.done{background:var(--green);}
        .t-dot.current{background:var(--orange);}
        .t-dot.wait{background:var(--gray-200);border:1.5px solid var(--gray-300);}
        .t-line{flex:1;height:1.5px;}
        .t-line.done{background:var(--green);}
        .t-line.wait{background:var(--gray-200);}
        .track-labels{display:flex;justify-content:space-between;margin-top:5px;margin-bottom:12px;}
        .t-lbl{font-size:8px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;}
        .t-lbl.done{color:var(--green);}
        .t-lbl.current{color:var(--orange);}
        .t-lbl.wait{color:var(--gray-300);}

        /* ACTION ROW */
        .oc-actions{display:flex;gap:8px;padding:0 14px 14px;}
        .oc-btn{flex:1;height:38px;border-radius:var(--radius-sm);font-size:11px;font-weight:700;cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:5px;transition:opacity .18s,transform .12s;}
        .oc-btn:active{opacity:.78;transform:scale(.97);}
        .oc-btn.view{background:var(--gray-100);color:var(--black);border:1.5px solid var(--gray-200);}
        .oc-btn.reorder{background:var(--black);color:#fff;}
        .oc-btn.pay{background:var(--orange);color:#fff;}

        /* EMPTY */
        .empty-wrap{padding:60px 20px;text-align:center;display:none;}
        .empty-wrap.show{display:block;}
        .empty-icon{font-size:44px;margin-bottom:14px;}
        .empty-title{font-size:16px;font-weight:700;}
        .empty-sub{font-size:12px;color:var(--gray-400);margin-top:6px;line-height:1.7;}
        .empty-cta{margin-top:20px;display:inline-flex;align-items:center;gap:7px;height:44px;padding:0 24px;background:var(--black);color:#fff;border:none;border-radius:var(--radius-sm);font-family:'Bebas Neue';font-size:15px;letter-spacing:2px;cursor:pointer;text-decoration:none;transition:opacity .18s;}
        .empty-cta:active{opacity:.8;}

        /* Auth notice */
        .auth-notice{background:var(--white);border:1.5px solid var(--gray-200);border-radius:var(--radius);padding:28px 20px;text-align:center;margin:0 auto;max-width:400px;}
        .auth-notice-icon{font-size:36px;margin-bottom:12px;}
        .auth-notice-title{font-size:16px;font-weight:700;margin-bottom:6px;}
        .auth-notice-sub{font-size:12px;color:var(--gray-400);line-height:1.65;margin-bottom:18px;}
        .auth-btn{display:inline-flex;align-items:center;gap:7px;height:44px;padding:0 22px;background:var(--black);color:#fff;border:none;border-radius:var(--radius-sm);font-family:'Bebas Neue';font-size:15px;letter-spacing:2px;cursor:pointer;text-decoration:none;transition:opacity .18s;}
        .auth-btn:active{opacity:.8;}

        @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
        .fu{animation:fadeUp .38s ease both;}
        .d1{animation-delay:.05s;}
    </style>
</head>
<body>

<nav class="nav">
    <div class="nav-left">
        <a href="account.html" class="icon-btn" aria-label="Back">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 11.5L6 8l3.5-3.5"/></svg>
        </a>
        <a href="index.html" class="brand">BARDS</a>
    </div>
    <div class="nav-right">
        <div class="cart-wrap">
            <a href="cart.html" class="icon-btn" aria-label="Cart">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
            </a>
            <span class="cart-badge" id="cartBadge"></span>
        </div>
    </div>
</nav>

<div class="page-start"></div>

<div class="filter-bar">
    <div class="filter-scroll" id="filterScroll"></div>
</div>

<div class="page">
    <div class="page-heading fu">
        <span class="page-title">MY ORDERS</span>
        <span class="page-count" id="pageCount"></span>
    </div>
    <div id="authNotice" style="display:none;" class="fu">
        <div class="auth-notice">
            <div class="auth-notice-icon">🔒</div>
            <div class="auth-notice-title">Sign in to view orders</div>
            <div class="auth-notice-sub">Your order history is saved to your account. Sign in to access it from any device.</div>
            <a href="signin.html" class="auth-btn">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                SIGN IN
            </a>
        </div>
    </div>
    <div class="order-list" id="orderList"></div>
    <div class="empty-wrap" id="emptyWrap">
        <div class="empty-icon">📦</div>
        <div class="empty-title">No orders yet</div>
        <div class="empty-sub">Once you place an order it will appear here.</div>
        <a href="index.html" class="empty-cta">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            SHOP NOW
        </a>
    </div>
</div>

<div class="toast" id="toast">
    <div class="t-iw" id="toastIw"></div>
    <div class="t-text">
        <div class="t-title" id="toastTitle"></div>
        <div class="t-sub" id="toastSub"></div>
    </div>
</div>

<script src="products.js"></script>
<script src="api.js"></script>
<script>
/* orders.html — Real API, ล่าสุดก่อน */

const FILTERS=[
    {id:'all',label:'All'},{id:'pending',label:'Pending'},{id:'paid',label:'Paid'},
    {id:'shipped',label:'Shipped'},{id:'delivered',label:'Delivered'},{id:'cancelled',label:'Cancelled'}
];
// ครบทั้ง 9 status ที่ orders.status เป็นไปได้จริง (เช็คจาก routes/seller.js's ALLOWED_TRANSITIONS +
// routes/payment.js's ABA-purchase-failure compensation — ไม่ใช่แค่ 6 ตัวที่เคยมี) ก่อนหน้านี้ processing/
// pending_verification/failed ไม่มี entry เลย ตกไปใช้ fallback ('Pending'/'st-pending'/step 0) ทำให้ order
// ที่จ่ายเงินแล้วจริง (processing) ดูเหมือนยังไม่จ่าย — แก้ตรงนี้
const STATUS_CSS={delivered:'st-delivered',shipped:'st-shipped',pending:'st-pending',cancelled:'st-cancelled',paid:'st-paid',expired:'st-cancelled',processing:'st-processing',pending_verification:'st-pending_verification',failed:'st-failed'};
// Badge wording (ขั้น 3, 2026-07-23) — สไตล์ TikTok Shop/Shopee: แยก label ครบทุก status ไม่รวมคำ
const STATUS_LBL={delivered:'Completed',shipped:'Shipped',pending:'To Pay',cancelled:'Cancelled',paid:'Paid',expired:'Expired',processing:'Preparing',pending_verification:'Verifying Payment',failed:'Payment Failed'};
// TRACK_STEPS ใช้ชื่อ bucket เดียวกับ STATUS_LBL ที่ merge กัน (pending+pending_verification="To Pay",
// paid+processing="To Ship") — แค่เปลี่ยนคำที่แสดง ไม่แตะ TRACK_IDX/step logic (ทำไว้แล้วขั้น 1)
const TRACK_STEPS=['To Pay','To Ship','To Receive','Completed'];
// pending_verification เหมือน pending (ยังไม่ถึงจุด "Paid") — ต่างจาก order-detail.html ซึ่งใช้ 5-step
// TRACK_IDX แยก paid/processing คนละ step กัน ไม่ใช่ bucket เดียวกันแบบที่นี่ (เจอความไม่ตรงกันนี้ตอนทำ
// ขั้น 3 — ทั้งสองไฟล์ตั้งใจให้ต่างกันแบบนี้ต่อไป ไม่ใช่บั๊ก แค่คนละ progress-bar design)
// processing ใช้ index เดียวกับ paid ("To Ship" bucket) failed เป็น terminal state ที่ไม่สำเร็จเหมือน
// cancelled/expired
const TRACK_IDX={pending:0,pending_verification:0,paid:1,processing:1,shipped:2,delivered:3,cancelled:-1,expired:-1,failed:-1};

let allOrders=[], activeFilter='all', _refreshTimer=null;

window.onload = async function() {
    if (!Auth.isLoggedIn()) {
        document.getElementById('authNotice')?.style.setProperty('display','block');
        updateBadge(); return;
    }
    try {
        const d = await OrdersAPI.list();
        allOrders = (d.orders||[]).sort((a,b)=>new Date(b.created_at||b.createdAt||0)-new Date(a.created_at||a.createdAt||0));
    } catch(err) {
        showToast('warn','Could not load orders',err.message);
        allOrders=[];
    }
    buildFilterTabs(); render(); updateBadge();
    const qId=new URLSearchParams(location.search).get('id');
    if (qId) { goToDetail(qId); }
    startAutoRefresh();
};

// เช็คสถานะใหม่เป็นระยะ (เช่น ABA webhook confirm ระหว่างที่เปิดหน้านี้ค้างไว้) — เงียบๆ ไม่รบกวนถ้าพัง
// เช็ค signature ก่อน re-render จริง กัน .fu (fade-up) animation เล่นซ้ำทุก 15 วิ ทั้งที่ไม่มีอะไรเปลี่ยน
function _ordersSignature(list){
    return list.map(o=>`${o.id}:${o.status}:${o.tracking_number||''}`).join('|');
}
function startAutoRefresh(){
    clearInterval(_refreshTimer);
    _refreshTimer=setInterval(async()=>{
        try{
            const d=await OrdersAPI.list();
            const fresh=(d.orders||[]).sort((a,b)=>new Date(b.created_at||b.createdAt||0)-new Date(a.created_at||a.createdAt||0));
            const changed=_ordersSignature(fresh)!==_ordersSignature(allOrders);
            allOrders=fresh;
            if(changed){ buildFilterTabs(); render(); }
        }catch(e){}
    },15000);
}
function buildFilterTabs(){
    document.getElementById('filterScroll').innerHTML=FILTERS.map(f=>{
        const cnt=f.id==='all'?allOrders.length:allOrders.filter(o=>o.status===f.id).length;
        return`<div class="f-tab ${f.id==='all'?'on':''}" data-filter="${f.id}" onclick="setFilter('${f.id}')">${f.label}<span class="f-cnt">${cnt}</span></div>`;
    }).join('');
}

function setFilter(id){
    activeFilter=id;
    document.querySelectorAll('.f-tab').forEach(t=>t.classList.toggle('on',t.dataset.filter===id));
    render();
}

/* ── RENDER LIST ── */
function render(){
    const list=activeFilter==='all'?allOrders:allOrders.filter(o=>o.status===activeFilter);
    const n=list.length;
    document.getElementById('pageCount').textContent=`${n} order${n!==1?'s':''}`;
    document.getElementById('emptyWrap').classList.toggle('show',n===0);
    document.getElementById('orderList').innerHTML=list.map((o,i)=>cardHTML(o,i)).join('');
}

function cardHTML(o,idx){
    const orderId=o.id||o.orderId||'—';
    const status=o.status||'pending';
    const stCss=STATUS_CSS[status]||'st-pending';
    const stLbl=STATUS_LBL[status]||'Pending';
    const stepIdx=TRACK_IDX[status]??0;
    const items=o.items||[];

    const thumbs=items.slice(0,3).map(it=>
        `<img class="oc-thumb" src="${escapeHtml(it.image||'')}" alt="" loading="lazy" onerror="this.style.opacity=0">`
    ).join('');
    const more=items.length>3?`<div class="oc-more">+${items.length-3}</div>`:'';

    let rail='',labels='';
    TRACK_STEPS.forEach((s,j)=>{
        const done=stepIdx>=0&&j<=stepIdx;
        const cur=stepIdx>=0&&j===stepIdx;
        rail+=`<div class="t-dot ${cur?'current':done?'done':'wait'}"></div>`;
        if(j<TRACK_STEPS.length-1)rail+=`<div class="t-line ${j<stepIdx?'done':'wait'}"></div>`;
        labels+=`<span class="t-lbl ${cur?'current':done?'done':'wait'}">${s}</span>`;
    });

    const total='$'+Number(o.total||0).toFixed(2);
    const cnt=items.length;
    const dateStr=o.date||(o.createdAt?new Date(o.createdAt).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}):'—');

    // ออเดอร์ยังไม่จ่าย ไม่ควรเสนอ "Buy Again" (ซื้อของที่ยังไม่จ่ายซ้ำไม่มีความหมาย) — แจ้งเตือนให้จ่าย
    // แทน (ตรงกับ order-detail.html's renderFooter ที่ซ่อน Buy Again ตอน status==='pending' เหมือนกัน)
    const reorderBtn = status==='pending'
        ? `<button class="oc-btn pay" onclick="event.stopPropagation();quickPayNow('${orderId}')">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
            Pay Now</button>`
        : status==='pending_verification'
        ? `<div class="oc-btn view" style="opacity:.35;pointer-events:none;font-size:10px;letter-spacing:.5px;">Verifying</div>`
        : (status==='cancelled'||status==='expired')
        ? `<div class="oc-btn view" style="opacity:.35;pointer-events:none;font-size:10px;letter-spacing:.5px;">${status==='expired'?'Expired':'Cancelled'}</div>`
        : `<button class="oc-btn reorder" onclick="event.stopPropagation();quickBuyAgain('${orderId}')">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="1 4 1 1 4 1"/><path d="M1 1 4.5 4.5A7 7 0 1 1 1 11"/></svg>
            Buy Again</button>`;

    return`<div class="order-card fu" style="animation-delay:${idx*.04}s" onclick="goToDetail('${orderId}')">
        <div class="oc-head">
            <div class="oc-id-wrap">
                <span class="oc-id">#${orderId}</span>
                <span class="oc-date">${dateStr}</span>
            </div>
            <span class="oc-badge ${stCss}">${stLbl}</span>
        </div>
        <div class="oc-items">
            <div class="oc-thumbs">${thumbs}${more}</div>
            <div class="oc-summary">
                <div class="oc-itemcount">${cnt} item${cnt!==1?'s':''}</div>
                <div class="oc-total">${total}</div>
            </div>
        </div>
        <div class="oc-track">
            <div class="track-rail">${rail}</div>
            <div class="track-labels">${labels}</div>
        </div>
        <div class="oc-actions">
            <button class="oc-btn view" onclick="event.stopPropagation();goToDetail('${orderId}')">
                <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M1 12s3-7 11-7 11 7 11 7-3 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
                View Details
            </button>
            ${reorderBtn}
        </div>
    </div>`;
}

/* ── DETAIL SHEET ── */
function goToDetail(id){
    location.href='order-detail.html?id='+encodeURIComponent(id);
}
function openDetailById(id){ goToDetail(id); }

function quickPayNow(orderId){
    const o=allOrders.find(x=>(x.id||x.orderId)===orderId);
    if(!o||!o.pay_token){ goToDetail(orderId); return; } // fallback: still reachable via the detail page's own pay banner
    location.href='pay.html?id='+encodeURIComponent(orderId)+'&token='+encodeURIComponent(o.pay_token);
}


function quickBuyAgain(orderId){
    const o=allOrders.find(x=>(x.id||x.orderId)===orderId);
    if(!_addToCart(orderId))return;
    updateBadge();
    showToast('ok','Added to cart',`${o?.items?.length||0} item(s) from #${orderId}`);
}

/* Merge items into BARDS_CART */
function _addToCart(orderId){
    const o=allOrders.find(x=>(x.id||x.orderId)===orderId);
    if(!o||!o.items?.length)return false;
    const cart=JSON.parse(localStorage.getItem('BARDS_CART')||'[]');
    o.items.forEach(item=>{
        const ex=cart.find(c=>c.id===item.id&&c.color===item.color&&c.size===item.size);
        if(ex)ex.quantity+=Number(item.quantity||1);
        else cart.push({...item,quantity:Number(item.quantity||1),price:Number(item.price||0)});
    });
    localStorage.setItem('BARDS_CART',JSON.stringify(cart));
    return true;
}

function updateBadge(){
    const cart=JSON.parse(localStorage.getItem('BARDS_CART')||'[]');
    const n=cart.reduce((t,c)=>t+Number(c.quantity||0),0);
    const b=document.getElementById('cartBadge');
    b.innerText=n>99?'99+':n; b.style.display=n>0?'flex':'none';
}

/* TOAST */
const SVG_OK='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
const SVG_WARN='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>';
let _tt;
function showToast(type,title,sub){
    const iw=document.getElementById('toastIw');
    iw.className='t-iw '+(type==='warn'?'warn':'ok');
    iw.innerHTML=type==='warn'?SVG_WARN:SVG_OK;
    document.getElementById('toastTitle').textContent=title;
    document.getElementById('toastSub').textContent=sub||'';
    const t=document.getElementById('toast');t.classList.add('on');
    clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('on'),2800);
}
</script>
