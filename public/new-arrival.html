<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>New Arrivals — Bards</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--black:#0A0A0A;--white:#FAFAFA;--gray-100:#F2F2F0;--gray-200:#E4E4E2;--gray-400:#8A8A88;--gray-600:#4A4A48;--orange:#FF4F00;--red:#C8001A;--radius:14px;--radius-sm:10px;--nav-h:60px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{font-family:'Space Grotesk',sans-serif;background:var(--white);color:var(--black);overscroll-behavior:none;padding-bottom:32px;}
.nav{position:fixed;top:0;left:0;right:0;z-index:200;height:var(--nav-h);display:flex;align-items:center;justify-content:space-between;padding:0 18px;background:rgba(250,250,250,.9);backdrop-filter:blur(18px) saturate(160%);-webkit-backdrop-filter:blur(18px) saturate(160%);border-bottom:1px solid var(--gray-200);}
.nav-left{display:flex;align-items:center;gap:12px;}
.nav-right{display:flex;align-items:center;gap:4px;}
.brand{font-family:'Bebas Neue';font-size:21px;letter-spacing:3px;color:var(--black);text-decoration:none;}
.icon-btn{width:36px;height:36px;border-radius:50%;background:var(--gray-100);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .18s,transform .12s;text-decoration:none;color:var(--black);position:relative;}
.icon-btn:active{background:var(--gray-200);transform:scale(.9);}
.cart-wrap{position:relative;}
.cart-badge{position:absolute;top:-2px;right:-2px;background:var(--orange);color:#fff;font-size:8px;font-weight:700;font-family:'DM Mono',monospace;min-width:15px;height:15px;border-radius:8px;display:none;align-items:center;justify-content:center;padding:0 3px;border:1.5px solid var(--white);}
.filter-strip{position:sticky;top:var(--nav-h);z-index:100;background:rgba(250,250,250,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--gray-200);padding:10px 0;}
.filter-row{display:flex;gap:7px;padding:0 18px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.filter-row::-webkit-scrollbar{display:none;}
.f-chip{height:32px;padding:0 13px;border:1.5px solid var(--gray-200);border-radius:30px;font-size:11px;font-weight:600;cursor:pointer;background:var(--white);color:var(--gray-600);transition:background .18s,border-color .18s,color .18s;white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:5px;font-family:'Space Grotesk',sans-serif;}
.f-chip.on{background:var(--black);border-color:var(--black);color:#fff;}
.f-chip:active{opacity:.7;}
.f-count{font-family:'DM Mono',monospace;font-size:9px;background:rgba(0,0,0,.07);border-radius:8px;padding:1px 5px;}
.f-chip.on .f-count{background:rgba(255,255,255,.18);}
.page-start{height:var(--nav-h);}
.section{padding:0 18px;max-width:800px;margin:0 auto;}
.sort-row{display:flex;align-items:center;justify-content:space-between;padding:13px 18px 6px;max-width:800px;margin:0 auto;}
.sort-results{font-family:'DM Mono',monospace;font-size:10px;color:var(--gray-400);letter-spacing:.5px;}
.sort-btn{height:28px;padding:0 12px;border:1.5px solid var(--gray-200);border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;background:var(--white);color:var(--gray-600);display:flex;align-items:center;gap:5px;font-family:'Space Grotesk',sans-serif;transition:all .18s;}
.sort-btn:active{opacity:.7;}
.sort-btn.active{background:var(--black);border-color:var(--black);color:#fff;}
.p-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.p-card{background:var(--white);border-radius:var(--radius);border:1px solid var(--gray-200);overflow:hidden;cursor:pointer;display:flex;flex-direction:column;text-decoration:none;color:inherit;position:relative;transition:transform .22s,box-shadow .22s;}
.p-card:active{transform:scale(.975);box-shadow:0 6px 24px rgba(0,0,0,.09);}
.p-card.wide{grid-column:1/-1;}
.p-card-img{aspect-ratio:1/1;overflow:hidden;background:var(--gray-100);position:relative;}
.p-card.wide .p-card-img{aspect-ratio:2/1;}
.p-card-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .38s ease;}
.p-card:active .p-card-img img{transform:scale(1.04);}
.p-tag{position:absolute;top:9px;left:9px;z-index:2;background:var(--black);color:#fff;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;padding:3px 9px;border-radius:20px;}
.p-tag.light{background:var(--white);color:var(--black);}
.p-tag.low-stock{background:var(--gray-600);color:#fff;top:auto;bottom:9px;}
.p-fav{position:absolute;top:9px;right:9px;z-index:2;width:29px;height:29px;border-radius:50%;background:rgba(255,255,255,.88);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .18s,background .18s;}
.p-fav:active{transform:scale(.85);}
.p-fav.liked{background:var(--black);}
.p-fav.liked svg{stroke:#fff;fill:#fff;}
.p-card-body{padding:10px 11px 13px;flex:1;display:flex;flex-direction:column;gap:7px;}
.p-name{font-size:12px;font-weight:600;line-height:1.35;letter-spacing:-.1px;}
.p-card.wide .p-name{font-size:14px;}
.p-meta{display:flex;align-items:center;justify-content:space-between;}
.p-price{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--red);}
.p-colors{display:flex;gap:4px;}
.p-dot{width:10px;height:10px;border-radius:50%;border:1.5px solid rgba(255,255,255,.7);box-shadow:0 0 0 1px rgba(0,0,0,.12);}
.empty{padding:60px 20px;text-align:center;display:none;}
.empty.show{display:block;}
.empty-icon{margin-bottom:16px;color:var(--gray-400);}
.empty-title{font-family:'Bebas Neue';font-size:22px;letter-spacing:2px;}
.empty-sub{font-size:12px;color:var(--gray-400);margin-top:6px;line-height:1.6;}
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(6px);background:var(--black);color:#fff;padding:12px 18px 12px 14px;border-radius:14px;z-index:9999;opacity:0;transition:opacity .28s,transform .28s;white-space:nowrap;display:flex;align-items:center;gap:10px;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.28);min-width:220px;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
.toast-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:rgba(255,255,255,.1);}
.toast-text{display:flex;flex-direction:column;gap:1px;}
.toast-title{font-size:12px;font-weight:700;}
.toast-sub{font-size:11px;color:rgba(255,255,255,.55);}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.fu{animation:fadeUp .42s ease both;}
.d1{animation-delay:.06s;}.d2{animation-delay:.12s;}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-left">
    <button class="icon-btn" onclick="history.back()"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 11.5L6 8l3.5-3.5"/></svg></button>
    <a href="/" class="brand">BARDS</a>
  </div>
  <div class="nav-right">
    <a href="account.html" class="icon-btn" aria-label="Account"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></a>
    <div class="cart-wrap">
      <a href="cart.html" class="icon-btn" aria-label="Cart"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg></a>
      <span class="cart-badge" id="cartBadge"></span>
    </div>
  </div>
</nav>

<div class="filter-strip">
  <div class="filter-row" id="filterRow"></div>
</div>

<div class="page-start"></div>

<div class="sort-row fu d1">
  <span class="sort-results" id="resultsLabel">0 Products</span>
  <button class="sort-btn" id="sortBtn" onclick="cycleSort()">
    <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M1 3h9M3 6.5h5M5.5 10h1"/></svg>
    <span id="sortLabel">Newest</span>
  </button>
</div>

<div class="section fu d2">
  <div class="p-grid" id="productGrid"></div>
  <div class="empty" id="emptyState">
    <div class="empty-icon"><svg width="52" height="52" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div>
    <div class="empty-title">Nothing Here Yet</div>
    <div class="empty-sub">New drops coming soon. Stay tuned.</div>
  </div>
</div>
<div style="height:32px"></div>

<div class="toast" id="toast">
  <div class="toast-icon" id="toastIcon"></div>
  <div class="toast-text"><div class="toast-title" id="toastTitle"></div><div class="toast-sub" id="toastSub"></div></div>
</div>

<script src="/api.js"></script>
<script src="/products.js"></script>
<script>
const SORT_OPTS=[
  {label:'Newest', fn:([,a],[,b])=>new Date(b.dateAdded)-new Date(a.dateAdded)},
  {label:'Price ↑',fn:([,a],[,b])=>a.price-b.price},
  {label:'Price ↓',fn:([,a],[,b])=>b.price-a.price},
  {label:'A → Z',  fn:([,a],[,b])=>a.name.localeCompare(b.name,'th')},
];
const S={sort:0,cat:'all',favs:JSON.parse(localStorage.getItem('NW_FAVS')||'[]')};

function fmtUSD(num){ return '$'+Number(num).toFixed(2); }

document.addEventListener('DOMContentLoaded', async () => { await fetchAndMerge({ isNew: true }).catch(()=>{}); buildChips(); renderGrid(); updateBadge(); });

function buildChips(){
  const newItems=Object.values(PRODUCTS).filter(p=>p.isNew);
  const cats=['all',...new Set(newItems.map(p=>p.category))];
  const counts={all:newItems.length};
  newItems.forEach(p=>{counts[p.category]=(counts[p.category]||0)+1;});
  const labels={all:'All',tops:'Tops',pants:'Pants',accessories:'Accessories'};
  document.getElementById('filterRow').innerHTML=cats.map((c,i)=>
    `<div class="f-chip${i===0?' on':''}" onclick="setCat(this,'${c}')">${labels[c]||c} <span class="f-count">${counts[c]||0}</span></div>`
  ).join('');
}
function setCat(el,cat){
  S.cat=cat;
  document.querySelectorAll('.f-chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on'); renderGrid();
}
function cycleSort(){
  S.sort=(S.sort+1)%SORT_OPTS.length;
  document.getElementById('sortLabel').innerText=SORT_OPTS[S.sort].label;
  document.getElementById('sortBtn').classList.toggle('active',S.sort>0);
  renderGrid();
}
function getItems(){
  let items=Object.entries(PRODUCTS).filter(([,p])=>p.isNew);
  if(S.cat!=='all') items=items.filter(([,p])=>p.category===S.cat);
  return [...items].sort(SORT_OPTS[S.sort].fn);
}
function renderGrid(){
  const items=getItems(); const n=items.length;
  document.getElementById('resultsLabel').innerText=`${n} ${n===1?'Product':'Products'}`;
  const grid=document.getElementById('productGrid'); const empty=document.getElementById('emptyState');
  if(!n){grid.innerHTML='';empty.classList.add('show');return;}
  empty.classList.remove('show');
  grid.innerHTML=items.map(([id,p],i)=>cardHTML(id,p,i===0&&n>=2)).join('');
}
function cardHTML(id,p,wide){
  const isFav=S.favs.includes(id);
  const dots=p.colors.map(c=>`<div class="p-dot" style="background:${c.hex}"></div>`).join('');
  const low=p.stock==='low-stock'?`<div class="p-tag low-stock">LOW STOCK</div>`:'';
  return`<a href="/product?id=${id}" class="p-card${wide?' wide':''}">
  <div class="p-card-img">
    <img src="${p.images[0]}" alt="${p.name}" loading="lazy">
    <div class="p-tag${p.tagLight?' light':''}">${p.tag}</div>${low}
    <button class="p-fav${isFav?' liked':''}" onclick="toggleFav(event,'${id}',this)" aria-label="Wishlist">
      <svg width="13" height="13" fill="${isFav?'currentColor':'none'}" stroke="${isFav?'#fff':'var(--gray-600)'}" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
    </button>
  </div>
  <div class="p-card-body">
    <div class="p-name">${p.name}</div>
    <div class="p-meta"><div class="p-price">${fmtUSD(p.price)}</div><div class="p-colors">${dots}</div></div>
  </div></a>`;
}
function toggleFav(e,id,btn){
  e.preventDefault();e.stopPropagation();
  const idx=S.favs.indexOf(id);const svg=btn.querySelector('svg');
  if(idx>-1){S.favs.splice(idx,1);btn.classList.remove('liked');svg.setAttribute('fill','none');svg.setAttribute('stroke','var(--gray-600)');showToast('Removed','Removed from Wishlist');}
  else{S.favs.push(id);btn.classList.add('liked');svg.setAttribute('fill','currentColor');svg.setAttribute('stroke','#fff');showToast('Saved!','Added to Wishlist ❤️');}
  localStorage.setItem('NW_FAVS',JSON.stringify(S.favs));
}
function updateBadge(){
  const cart=JSON.parse(localStorage.getItem('BARDS_CART')||'[]');
  const n=cart.reduce((t,c)=>t+c.quantity,0);
  const b=document.getElementById('cartBadge');
  b.innerText=n>99?'99+':n;b.style.display=n>0?'flex':'none';
}
const ICON_OK=`<svg width="13" height="13" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="11 3 5 10 2 7"/></svg>`;
let _tt;
function showToast(title,sub){
  document.getElementById('toastIcon').innerHTML=ICON_OK;
  document.getElementById('toastTitle').innerText=title;
  document.getElementById('toastSub').innerText=sub||'';
  const t=document.getElementById('toast');t.classList.add('on');
  clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('on'),2700);
}
</script>
</body>
</html>
