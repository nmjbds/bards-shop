<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sign In — Bards</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--black:#0A0A0A;--white:#FAFAFA;--gray-100:#F2F2F0;--gray-200:#E4E4E2;--gray-300:#C8C8C6;--gray-400:#8A8A88;--red:#C8001A;--green:#16A34A;--radius:14px;--radius-sm:10px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Space Grotesk',sans-serif;background:var(--gray-100);color:var(--black);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 16px 40px;}
.logo-wrap{text-align:center;margin-bottom:28px;}
.brand{font-family:'Bebas Neue';font-size:32px;letter-spacing:5px;color:var(--black);text-decoration:none;display:block;}
.brand-sub{font-size:11px;color:var(--gray-400);letter-spacing:2px;text-transform:uppercase;margin-top:3px;}
.card{background:var(--white);border:1.5px solid var(--gray-200);border-radius:var(--radius);padding:28px 22px 24px;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,.06);}
.card-title{font-family:'Bebas Neue';font-size:22px;letter-spacing:2.5px;margin-bottom:4px;}
.card-sub{font-size:12px;color:var(--gray-400);margin-bottom:24px;}
.form-group{margin-bottom:14px;}
.f-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gray-400);margin-bottom:6px;display:block;}
.f-input{width:100%;height:46px;padding:0 14px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);font-family:'Space Grotesk',sans-serif;font-size:13px;background:var(--white);color:var(--black);outline:none;transition:border-color .2s;-webkit-appearance:none;appearance:none;}
.f-input:focus{border-color:var(--black);}
.f-input::placeholder{color:var(--gray-300);}
.pw-wrap{position:relative;}
.pw-wrap .f-input{padding-right:44px;}
.pw-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--gray-400);display:flex;align-items:center;padding:4px;transition:color .18s;}
.pw-eye:hover{color:var(--black);}
.forgot{display:block;text-align:right;font-size:11px;font-weight:600;color:var(--gray-400);text-decoration:none;margin-top:-6px;margin-bottom:20px;transition:color .18s;}
.forgot:hover{color:var(--black);}
.btn{width:100%;height:50px;background:var(--black);color:#fff;border:none;border-radius:var(--radius-sm);font-family:'Bebas Neue';font-size:18px;letter-spacing:2.5px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .18s;margin-bottom:16px;}
.btn:active{opacity:.8;}
.btn.loading{background:var(--gray-200);color:var(--gray-400);pointer-events:none;}
.btn.success{background:var(--green);pointer-events:none;}
.divider{display:flex;align-items:center;gap:10px;margin:4px 0 16px;color:var(--gray-300);font-size:11px;font-weight:600;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--gray-200);}
.social{width:100%;height:46px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);background:var(--white);color:var(--black);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:background .18s;margin-bottom:10px;position:relative;}
.social:active{background:var(--gray-100);}
/* Social loading state */
.social.loading{pointer-events:none;opacity:.6;}
.tg-wrap{width:100%;display:flex;justify-content:center;margin-bottom:10px;min-height:40px;}
.switch{text-align:center;margin-top:22px;font-size:12px;color:var(--gray-400);}
.switch a{color:var(--black);font-weight:700;text-decoration:none;}
.err-banner{background:#FEF2F2;border:1.5px solid #FECACA;border-radius:var(--radius-sm);padding:11px 13px;font-size:12px;color:var(--red);margin-bottom:16px;display:none;align-items:center;gap:8px;}
.err-banner.show{display:flex;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(6px);background:var(--black);color:#fff;padding:11px 18px;border-radius:12px;font-size:13px;font-weight:500;z-index:9999;opacity:0;transition:opacity .28s,transform .28s;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.28);}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.fu{animation:fadeUp .38s ease both;}
.d1{animation-delay:.06s;}
</style>
</head>
<body>
<div class="logo-wrap fu"><a href="index.html" class="brand">BARDS</a><div class="brand-sub">Streetwear</div></div>
<div class="card fu d1">
  <div class="card-title">Welcome Back</div>
  <div class="card-sub">Sign in to your account</div>
  <div class="err-banner" id="errBanner">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span id="errMsg"></span>
  </div>
  <div class="form-group">
    <label class="f-label">Email</label>
    <input type="email" class="f-input" id="email" placeholder="you@example.com" autocomplete="email" inputmode="email">
  </div>
  <div class="form-group">
    <label class="f-label">Password</label>
    <div class="pw-wrap">
      <input type="password" class="f-input" id="password" placeholder="••••••••" autocomplete="current-password">
      <button class="pw-eye" type="button" aria-label="Toggle password visibility" onclick="togglePw('password', this)">
        <!-- eye-open icon (shown when password is hidden) -->
        <svg class="icon-eye" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M1 12s3-7 11-7 11 7 11 7-3 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
        <!-- eye-off icon (shown when password is visible) -->
        <svg class="icon-eye-off" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
      </button>
    </div>
  </div>
  <a href="forgot-password.html" class="forgot">Forgot password?</a>
  <button class="btn" id="submitBtn" onclick="handleSignIn()">
    SIGN IN
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
  </button>
  <div class="divider">or continue with</div>
  <button class="social" id="googleBtn" onclick="handleSocialLogin('google')">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.6 33.1 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.1-2.7-.1-4z"/><path fill="#FF3D00" d="M6.3 14.7 13 19.6C14.9 14.7 19 11 24 11c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.5 29.3 4 24 4c-7.7 0-14.3 4.4-17.7 10.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5L31.8 33.5C29.9 34.8 27.1 35.7 24 35.7c-5.2 0-9.6-3.4-11.2-8l-6.6 5.1C9.8 39.7 16.4 44 24 44z"/><path fill="#1976D2" d="M43.6 20H24v8h11.3c-.8 2.3-2.4 4.3-4.4 5.6L37 39c3.6-3.3 5.8-8 5.8-13.7 0-1.3-.1-2.7-.2-4z"/></svg>
    <span>Continue with Google</span>
  </button>
  <div class="tg-wrap" id="tgWrap">
    <script async src="https://telegram.org/js/telegram-widget.js?22"
      data-telegram-login="bardsofficial_bot"
      data-size="large"
      data-radius="10"
      data-auth-url="/api/auth/telegram/callback"
      data-request-access="write"></script>
  </div>

  <div class="switch">Don't have an account? <a href="signup.html">Sign up</a></div>
</div>
<div class="toast" id="toast"></div>

<script src="products.js"></script>
<script src="api.js"></script>
<script>
/* ── Auth guard — skip ถ้าเป็น OAuth callback ── */
const _qs = new URLSearchParams(location.search);
if (typeof Auth !== 'undefined' && Auth.isLoggedIn() && !_qs.has('token') && !_qs.has('error')) {
  location.href = _qs.get('redirect') || 'account.html';
}

/* ── OAuth callback handler ── */
document.addEventListener('DOMContentLoaded', async () => {
  const p = new URLSearchParams(location.search);
  const token = p.get('token');
  const error = p.get('error');

  if (error) {
    // p.get() already URL-decodes the value (and converts '+' to spaces),
    // so no extra decodeURIComponent() is needed here.
    if (error.includes('Google') || error.includes('google')) {
      showErr('Google login failed. Check that the callback URL is added in Google Cloud Console.');
    } else if (error.includes('Telegram') || error.includes('telegram')) {
      showErr('Telegram login failed. Please try again.');
    } else {
      showErr(error || 'Login failed. Please try again.');
    }
    history.replaceState({}, '', location.pathname);
    return;
  }

  if (token) {
    try {
      await AuthAPI.handleOAuthCallback();
      await WishlistAPI.syncOnLogin().catch(() => {});
      const redirect = p.get('redirect') || 'account.html';
      location.href = redirect;
    } catch(e) {
      showErr(e.message || 'Login failed. Please try again.');
      history.replaceState({}, '', location.pathname);
    }
  }
});

/* ── Toggle password visibility ── */
function togglePw(fieldId, btn) {
  const input = document.getElementById(fieldId);
  const isHidden = input.type === 'password';
  input.type = isHidden ? 'text' : 'password';
  btn.querySelector('.icon-eye').style.display     = isHidden ? 'none'  : '';
  btn.querySelector('.icon-eye-off').style.display = isHidden ? ''      : 'none';
}

/* ── Social login with loading spinner ── */
const _spinnerSvg = `<svg style="animation:spin .8s linear infinite;flex-shrink:0" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>`;

async function handleSocialLogin(provider) {
  const btn = document.getElementById('googleBtn');
  const originalHTML = btn.innerHTML;

  btn.classList.add('loading');
  btn.innerHTML = `${_spinnerSvg} <span>Connecting…</span>`;

  try {
    await AuthAPI.loginWithGoogle();
    /* If loginWithGoogle redirects, the rest of this code won't run */
  } catch(e) {
    /* Restore button on error (popup blocked, network fail, etc.) */
    btn.classList.remove('loading');
    btn.innerHTML = originalHTML;
    showErr(e.message || `${provider} login failed.`);
  }
}

/* ── Email / password sign-in ── */
let _loading = false;

async function handleSignIn() {
  if (_loading) return;
  const email = document.getElementById('email').value.trim();
  const pw    = document.getElementById('password').value;
  clearErr();
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showErr('Please enter a valid email.'); return; }
  if (!pw) { showErr('Please enter your password.'); return; }
  setLoading(true);
  try {
    await AuthAPI.signin(email.toLowerCase(), pw);
    WishlistAPI.syncOnLogin().catch(() => {});
    setLoading(false, 'success');
    toast('Signed in! 👋');
    setTimeout(() => { const p = new URLSearchParams(location.search); location.href = p.get('redirect') || 'account.html'; }, 700);
  } catch(e) {
    setLoading(false);
    showErr(e.message || 'Incorrect email or password.');
  }
}

function setLoading(on, state) {
  _loading = on;
  const btn = document.getElementById('submitBtn');
  if (state === 'success') {
    btn.innerHTML = '✓ Signed In';
    btn.className = 'btn success';
  } else if (on) {
    btn.innerHTML = `${_spinnerSvg} Signing in…`;
    btn.className = 'btn loading';
  } else {
    btn.innerHTML = 'SIGN IN <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
    btn.className = 'btn';
  }
}

/* ── Helpers ── */
function showErr(msg) { document.getElementById('errMsg').textContent = msg; document.getElementById('errBanner').classList.add('show'); }
function clearErr()   { document.getElementById('errBanner').classList.remove('show'); }

let _tt;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('on');
  clearTimeout(_tt);
  _tt = setTimeout(() => t.classList.remove('on'), 2500);
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') handleSignIn(); });
</script>
</body>
</html>
