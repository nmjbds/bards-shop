<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sign Up — Bards</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--black:#0A0A0A;--white:#FAFAFA;--gray-50:#F9F9F7;--gray-100:#F2F2F0;--gray-200:#E4E4E2;--gray-300:#C8C8C6;--gray-400:#8A8A88;--gray-600:#4A4A48;--orange:#FF4F00;--red:#C8001A;--green:#16A34A;--radius:14px;--radius-sm:10px;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Space Grotesk',sans-serif;background:var(--gray-100);color:var(--black);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 16px 40px;}
.logo-wrap{text-align:center;margin-bottom:28px;}
.brand{font-family:'Bebas Neue';font-size:32px;letter-spacing:5px;color:var(--black);text-decoration:none;display:block;}
.brand-sub{font-size:11px;color:var(--gray-400);letter-spacing:2px;text-transform:uppercase;margin-top:3px;}
.card{background:var(--white);border:1.5px solid var(--gray-200);border-radius:var(--radius);padding:28px 22px 24px;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,.06);}
.card-title{font-family:'Bebas Neue';font-size:22px;letter-spacing:2.5px;margin-bottom:4px;}
.card-sub{font-size:12px;color:var(--gray-400);margin-bottom:24px;}
.form-group{margin-bottom:13px;}
.form-row-two{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px;}
.f-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gray-400);margin-bottom:6px;display:block;}
.f-req{color:var(--red);}
.f-input{width:100%;height:46px;padding:0 14px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);font-family:'Space Grotesk',sans-serif;font-size:13px;background:var(--white);color:var(--black);outline:none;transition:border-color .2s;-webkit-appearance:none;appearance:none;}
.f-input:focus{border-color:var(--black);}
.f-input.err{border-color:var(--red);background:#FFF5F5;}
.f-input::placeholder{color:var(--gray-300);}
.f-err{font-size:10px;color:var(--red);margin-top:4px;display:none;font-weight:500;}
.f-err.show{display:block;}
.pw-wrap{position:relative;}
.pw-wrap .f-input{padding-right:44px;}
.pw-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--gray-400);display:flex;align-items:center;padding:4px;transition:color .18s;}
.pw-eye:hover{color:var(--black);}
/* strength bar */
.strength-wrap{margin-top:7px;display:none;}
.strength-wrap.show{display:block;}
.strength-bar{height:3px;border-radius:2px;background:var(--gray-200);overflow:hidden;margin-bottom:4px;}
.strength-fill{height:100%;border-radius:2px;width:0;transition:width .3s,background .3s;}
.strength-lbl{font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--gray-400);}
/* terms */
.terms-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:18px;cursor:pointer;}
.checkbox{width:18px;height:18px;border-radius:5px;border:2px solid var(--gray-300);background:var(--white);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.checkbox.on{background:var(--black);border-color:var(--black);}
.checkbox svg{display:none;}
.checkbox.on svg{display:block;}
.terms-text{font-size:11px;color:var(--gray-400);line-height:1.6;}
.terms-text a{color:var(--black);font-weight:600;text-decoration:none;}
/* submit */
.submit-btn{width:100%;height:50px;background:var(--black);color:#fff;border:none;border-radius:var(--radius-sm);font-family:'Bebas Neue';font-size:18px;letter-spacing:2.5px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .18s,transform .12s;margin-bottom:16px;}
.submit-btn:active{opacity:.82;transform:scale(.98);}
.submit-btn.loading{background:var(--gray-200);color:var(--gray-400);pointer-events:none;}
.submit-btn.success{background:var(--green);color:#fff;pointer-events:none;}
.or-divider{display:flex;align-items:center;gap:10px;margin:4px 0 16px;color:var(--gray-300);font-size:11px;font-weight:600;}
.or-divider::before,.or-divider::after{content:'';flex:1;height:1px;background:var(--gray-200);}
.social-btn{width:100%;height:46px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);background:var(--white);color:var(--black);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .18s;margin-bottom:10px;}
.social-btn:active{background:var(--gray-100);}
.social-btn.loading{pointer-events:none;opacity:.6;}
.social-btn.tg{border-color:#2AABEE;color:#2AABEE;}
.switch-row{text-align:center;margin-top:22px;font-size:12px;color:var(--gray-400);}
.switch-row a{color:var(--black);font-weight:700;text-decoration:none;}
.err-banner{background:#FEF2F2;border:1.5px solid #FECACA;border-radius:var(--radius-sm);padding:11px 13px;font-size:12px;color:var(--red);margin-bottom:16px;display:none;align-items:center;gap:8px;}
.err-banner.show{display:flex;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(6px);background:var(--black);color:#fff;padding:12px 18px 12px 14px;border-radius:14px;font-size:13px;font-weight:500;z-index:9999;opacity:0;transition:opacity .28s,transform .28s;white-space:nowrap;display:flex;align-items:center;gap:10px;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.28);min-width:220px;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
.t-iw{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.t-iw.ok{background:rgba(22,163,74,.25);}
.t-iw.warn{background:rgba(234,179,8,.2);}
.t-text{display:flex;flex-direction:column;gap:1px;}
.t-title{font-size:12px;font-weight:700;}
.t-sub{font-size:11px;color:rgba(255,255,255,.55);}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.fu{animation:fadeUp .38s ease both;}
.d1{animation-delay:.06s;}
</style>
</head>
<body>

<div class="logo-wrap fu">
  <a href="index.html" class="brand">BARDS</a>
  <div class="brand-sub">Streetwear</div>
</div>

<div class="card fu d1">
  <div class="card-title">Create Account</div>
  <div class="card-sub">Join Bards — free forever</div>

  <div class="err-banner" id="errBanner">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span id="errMsg">Something went wrong</span>
  </div>

  <div class="form-row-two">
    <div>
      <label class="f-label">First Name <span class="f-req">*</span></label>
      <input type="text" class="f-input" id="fname" placeholder="Alex" autocomplete="given-name">
      <div class="f-err" id="fname-err">Required</div>
    </div>
    <div>
      <label class="f-label">Last Name <span class="f-req">*</span></label>
      <input type="text" class="f-input" id="lname" placeholder="Mercer" autocomplete="family-name">
      <div class="f-err" id="lname-err">Required</div>
    </div>
  </div>

  <div class="form-group">
    <label class="f-label">Email Address <span class="f-req">*</span></label>
    <input type="email" class="f-input" id="email" placeholder="you@example.com" autocomplete="email" inputmode="email">
    <div class="f-err" id="email-err">Please enter a valid email</div>
  </div>

  <div class="form-group">
    <label class="f-label">Password <span class="f-req">*</span></label>
    <div class="pw-wrap">
      <input type="password" class="f-input" id="password" placeholder="Min. 8 characters" autocomplete="new-password" oninput="checkStrength(this.value)">
      <button class="pw-eye" type="button" aria-label="Toggle password visibility" onclick="togglePw('password', this)">
        <svg class="icon-eye" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M1 12s3-7 11-7 11 7 11 7-3 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
        <svg class="icon-eye-off" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
      </button>
    </div>
    <div class="strength-wrap" id="strengthWrap">
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      <div class="strength-lbl" id="strengthLbl">Weak</div>
    </div>
    <div class="f-err" id="password-err">Password must be at least 8 characters</div>
  </div>

  <div class="form-group">
    <label class="f-label">Confirm Password <span class="f-req">*</span></label>
    <div class="pw-wrap">
      <input type="password" class="f-input" id="confirm" placeholder="Repeat password" autocomplete="new-password">
      <button class="pw-eye" type="button" aria-label="Toggle password visibility" onclick="togglePw('confirm', this)">
        <svg class="icon-eye" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M1 12s3-7 11-7 11 7 11 7-3 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
        <svg class="icon-eye-off" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
      </button>
    </div>
    <div class="f-err" id="confirm-err">Passwords do not match</div>
  </div>

  <div class="terms-row" onclick="toggleTerms(this)">
    <div class="checkbox" id="termsBox">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="terms-text">I agree to Bards' <a href="#" onclick="event.stopPropagation()">Terms of Service</a> and <a href="#" onclick="event.stopPropagation()">Privacy Policy</a></div>
  </div>

  <button class="submit-btn" id="submitBtn" onclick="handleSignUp()">
    CREATE ACCOUNT
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
  </button>

  <div class="or-divider">or sign up with</div>

  <button class="social-btn google" id="googleBtn" onclick="handleSocialLogin('google')">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.6 33.1 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.1-2.7-.1-4z"/><path fill="#FF3D00" d="M6.3 14.7 13 19.6C14.9 14.7 19 11 24 11c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.5 29.3 4 24 4c-7.7 0-14.3 4.4-17.7 10.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5L31.8 33.5C29.9 34.8 27.1 35.7 24 35.7c-5.2 0-9.6-3.4-11.2-8l-6.6 5.1C9.8 39.7 16.4 44 24 44z"/><path fill="#1976D2" d="M43.6 20H24v8h11.3c-.8 2.3-2.4 4.3-4.4 5.6L37 39c3.6-3.3 5.8-8 5.8-13.7 0-1.3-.1-2.7-.2-4z"/></svg>
    <span>Continue with Google</span>
  </button>

  <button class="social-btn tg" id="telegramBtn" onclick="handleTelegramLogin()">
    <svg width="18" height="18" viewBox="0 0 240 240"><circle cx="120" cy="120" r="120" fill="#2AABEE"/><path fill="#fff" d="M180.5 72.3 158 179.2c-1.7 7.6-6.2 9.5-12.5 5.9l-34.6-25.5-16.7 16.1c-1.8 1.8-3.4 3.4-6.9 3.4l2.5-35.1 63.9-57.7c2.8-2.5-.6-3.9-4.3-1.4L69 138.6l-34.3-10.7c-7.5-2.3-7.6-7.5 1.6-11.1l134-51.7c6.2-2.3 11.7 1.5 9.7 11.2z"/></svg>
    <span>Continue with Telegram</span>
  </button>

  <div class="switch-row">
    Already have an account? <a href="signin.html" id="signinLink">Sign in</a>
  </div>
</div>

<div class="toast" id="toast">
  <div class="t-iw" id="toastIw"></div>
  <div class="t-text"><div class="t-title" id="toastTitle"></div><div class="t-sub" id="toastSub"></div></div>
</div>

<script src="products.js"></script>
<script src="api.js"></script>
<script src="https://telegram.org/js/telegram-widget.js?22"></script>
<script>
/* ── Auth guard ── */
const _qs = new URLSearchParams(location.search);
if (typeof Auth !== 'undefined' && typeof Auth.isLoggedIn === 'function' && Auth.isLoggedIn()) {
  location.href = safeRedirect(_qs.get('redirect')) || 'account.html';
}
/* Preserve ?redirect= across the "Sign in" link too */
if (_qs.get('redirect')) {
  const link = document.getElementById('signinLink');
  if (link) link.href = 'signin.html?redirect=' + encodeURIComponent(_qs.get('redirect'));
}

let _loading = false;
let _termsAccepted = false;

/* ── Toggle password visibility ── */
function togglePw(fieldId, btn) {
  const input = document.getElementById(fieldId);
  const isHidden = input.type === 'password';
  input.type = isHidden ? 'text' : 'password';
  btn.querySelector('.icon-eye').style.display     = isHidden ? 'none' : '';
  btn.querySelector('.icon-eye-off').style.display = isHidden ? ''     : 'none';
}

/* ── Password strength checker ── */
function checkStrength(val) {
  const wrap = document.getElementById('strengthWrap');
  const fill = document.getElementById('strengthFill');
  const lbl  = document.getElementById('strengthLbl');
  if (!val) { wrap.classList.remove('show'); return; }
  wrap.classList.add('show');

  let score = 0;
  if (val.length >= 8)  score++;
  if (val.length >= 12) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;

  const levels = [
    { pct: '20%', color: '#C8001A', text: 'Very Weak' },
    { pct: '40%', color: '#EA580C', text: 'Weak'      },
    { pct: '60%', color: '#CA8A04', text: 'Fair'      },
    { pct: '80%', color: '#16A34A', text: 'Strong'    },
    { pct: '100%',color: '#15803D', text: 'Very Strong'},
  ];
  const lvl = levels[Math.min(score - 1, 4)] || levels[0];
  fill.style.width      = lvl.pct;
  fill.style.background = lvl.color;
  lbl.textContent       = lvl.text;
  lbl.style.color       = lvl.color;
}

/* ── Terms toggle ── */
function toggleTerms(row) {
  _termsAccepted = !_termsAccepted;
  document.getElementById('termsBox').classList.toggle('on', _termsAccepted);
}

/* ── Validation ── */
function validate() {
  const fname = document.getElementById('fname').value.trim();
  const lname = document.getElementById('lname').value.trim();
  const email = document.getElementById('email').value.trim();
  const pw    = document.getElementById('password').value;
  const conf  = document.getElementById('confirm').value;
  clearErr();
  if (!fname) { showErr('Please enter your first name.'); return false; }
  if (!lname) { showErr('Please enter your last name.');  return false; }
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showErr('Please enter a valid email.'); return false; }
  if (pw.length < 8) { showErr('Password must be at least 8 characters.'); return false; }
  if (pw !== conf)   { showErr('Passwords do not match.'); return false; }
  if (!_termsAccepted) { showErr('Please accept the Terms of Service to continue.'); return false; }
  return true;
}

/* ── Spinner SVG shared ── */
const _spinnerSvg = `<svg style="animation:spin .8s linear infinite;flex-shrink:0" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>`;

/* ── Telegram login (custom-styled button, Telegram's official popup API) ── */
// bot_id is the numeric ID from BotFather (the number before the ':' in your bot token) — NOT the username.
// Get it via: https://api.telegram.org/bot<YOUR_TOKEN>/getMe  (look for "id")
const TELEGRAM_BOT_ID = '8741549115';

function handleTelegramLogin() {
  const btn = document.getElementById('telegramBtn');
  if (!window.Telegram || !window.Telegram.Login) {
    showErr('Telegram login is still loading — please try again in a second.');
    return;
  }
  const originalHTML = btn.innerHTML;
  btn.classList.add('loading');
  btn.innerHTML = `${_spinnerSvg} <span>Connecting…</span>`;

  window.Telegram.Login.auth(
    { bot_id: TELEGRAM_BOT_ID, request_access: 'write' },
    async (user) => {
      if (!user) {
        btn.classList.remove('loading');
        btn.innerHTML = originalHTML;
        showErr('Telegram login was cancelled.');
        return;
      }
      try {
        const res  = await fetch('/api/auth/telegram/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(user),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Telegram login failed.');
        const redirect = safeRedirect(_qs.get('redirect'));
        location.href = `signin.html?token=${encodeURIComponent(data.token)}` + (redirect ? `&redirect=${encodeURIComponent(redirect)}` : '');
      } catch(e) {
        btn.classList.remove('loading');
        btn.innerHTML = originalHTML;
        showErr(e.message || 'Telegram login failed.');
      }
    }
  );
}

/* ── Social login with loading state ── */
async function handleSocialLogin(provider) {
  const btn = document.getElementById('googleBtn');
  const originalHTML = btn.innerHTML;

  btn.classList.add('loading');
  btn.innerHTML = `${_spinnerSvg} <span>Connecting…</span>`;

  try {
    const redirect = safeRedirect(_qs.get('redirect'));
    await AuthAPI.loginWithGoogle(redirect);
  } catch(e) {
    btn.classList.remove('loading');
    btn.innerHTML = originalHTML;
    showErr(e.message || `${provider} login failed.`);
  }
}

/* ── Main sign-up handler ── */
async function handleSignUp() {
  if (_loading || !validate()) return;
  setLoading(true);
  const fname = document.getElementById('fname').value.trim();
  const lname = document.getElementById('lname').value.trim();
  const email = document.getElementById('email').value.trim().toLowerCase();
  const pw    = document.getElementById('password').value;
  try {
    await AuthAPI.signup((fname + ' ' + lname).trim(), email, pw);
    setLoading(false, 'success');
    setTimeout(() => { location.href = safeRedirect(_qs.get('redirect')) || 'account.html'; }, 800);
  } catch(err) {
    setLoading(false);
    showErr(err.message || 'Could not create account. Please try again.');
  }
}

function setLoading(on, state) {
  _loading = on;
  const btn = document.getElementById('submitBtn');
  if (state === 'success') {
    btn.innerHTML = `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Account Created!`;
    btn.className = 'submit-btn success';
  } else if (on) {
    btn.innerHTML = `${_spinnerSvg} Creating account…`;
    btn.className = 'submit-btn loading';
  } else {
    btn.innerHTML = 'CREATE ACCOUNT <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
    btn.className = 'submit-btn';
  }
}

/* ── Helpers ── */
function showErr(msg) {
  document.getElementById('errMsg').textContent = msg;
  document.getElementById('errBanner').classList.add('show');
}
function clearErr() {
  document.getElementById('errBanner').classList.remove('show');
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') handleSignUp(); });
</script>
</body>
</html>
