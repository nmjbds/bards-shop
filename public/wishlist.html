<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Saved Items — Bards</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --black:#0A0A0A; --white:#FAFAFA; --gray-50:#F9F9F7; --gray-100:#F2F2F0;
            --gray-200:#E4E4E2; --gray-300:#C8C8C6; --gray-400:#8A8A88; --gray-600:#4A4A48;
            --orange:#FF4F00; --red:#C8001A; --green:#16A34A;
            --radius:14px; --radius-sm:10px; --nav-h:60px;
        }
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        html{scroll-behavior:smooth;}
        body{font-family:'Space Grotesk',sans-serif;background:var(--gray-100);color:var(--black);overscroll-behavior:none;min-height:100vh;padding-bottom:48px;}

        /* NAV — same as all pages */
        .nav{position:fixed;top:0;left:0;right:0;z-index:200;height:var(--nav-h);display:flex;align-items:center;justify-content:space-between;padding:0 18px;background:rgba(250,250,250,.92);backdrop-filter:blur(18px) saturate(160%);-webkit-backdrop-filter:blur(18px) saturate(160%);border-bottom:1px solid var(--gray-200);}
        .nav-left{display:flex;align-items:center;gap:12px;}
        .nav-right{display:flex;align-items:center;gap:4px;}
        .brand{font-family:'Bebas Neue';font-size:21px;letter-spacing:3px;color:var(--black);text-decoration:none;}
        .icon-btn{width:36px;height:36px;border-radius:50%;background:var(--gray-100);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .18s,transform .12s;text-decoration:none;color:var(--black);}
        .icon-btn:active{background:var(--gray-200);transform:scale(.9);}
        .cart-wrap{position:relative;}
        .cart-badge{position:absolute;top:-2px;right:-2px;background:var(--orange);color:#fff;font-size:8px;font-weight:700;font-family:'DM Mono',monospace;min-width:15px;height:15px;border-radius:8px;display:none;align-items:center;justify-content:center;padding:0 3px;border:1.5px solid var(--white);}
        .page-start{height:var(--nav-h);}

        /* PAGE */
        .page{max-width:800px;margin:0 auto;padding:20px 14px 0;}
        .page-heading{display:flex;align-items:baseline;gap:10px;margin-bottom:16px;}
        .page-title{font-family:'Bebas Neue';font-size:28px;letter-spacing:3px;color:var(--black);}
        .page-count{font-family:'DM Mono',monospace;font-size:11px;color:var(--gray-400);letter-spacing:.5px;}

        /* GRID (2-col, same visual language as all-products.html) */
        .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
        .p-card{background:var(--white);border:1.5px solid var(--gray-200);border-radius:var(--radius);overflow:hidden;text-decoration:none;color:inherit;display:flex;flex-direction:column;transition:transform .18s,box-shadow .18s;}
        .p-card:active{transform:scale(.98);box-shadow:0 6px 20px rgba(0,0,0,.06);}
        .p-card-img{aspect-ratio:1/1;overflow:hidden;background:var(--gray-100);position:relative;}
        .p-card-img img{width:100%;height:100%;object-fit:cover;display:block;}
        .p-fav{position:absolute;top:9px;right:9px;z-index:2;width:29px;height:29px;border-radius:50%;background:var(--black);color:#fff;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .18s,opacity .18s;}
        .p-fav:active{transform:scale(.85);}
        .p-fav.loading{opacity:.5;pointer-events:none;}
        .p-card-body{padding:10px 11px 13px;flex:1;display:flex;flex-direction:column;gap:7px;}
        .p-name{font-size:12px;font-weight:600;line-height:1.35;letter-spacing:-.1px;}
        .p-price{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--red);}

        .empty-wrap{padding:70px 20px;text-align:center;display:none;}
        .empty-wrap.show{display:block;}
        .empty-icon{font-size:40px;margin-bottom:14px;}
        .empty-title{font-size:15px;font-weight:600;}
        .empty-sub{font-size:12px;color:var(--gray-400);margin-top:6px;line-height:1.6;}
        .empty-cta{display:inline-flex;align-items:center;gap:7px;margin-top:18px;height:44px;padding:0 20px;background:var(--black);color:#fff;border-radius:var(--radius-sm);text-decoration:none;font-family:'Bebas Neue';font-size:14px;letter-spacing:2px;}

        .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(6px);background:var(--black);color:#fff;padding:12px 18px 12px 14px;border-radius:14px;font-size:13px;font-weight:500;z-index:9999;opacity:0;transition:opacity .28s,transform .28s;white-space:nowrap;display:flex;align-items:center;gap:10px;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.28);min-width:200px;}
        .toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
        .t-iw{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:rgba(22,163,74,.25);}
        .t-text{display:flex;flex-direction:column;gap:1px;}
        .t-title{font-size:12px;font-weight:700;letter-spacing:.3px;}
        .t-sub{font-size:11px;color:rgba(255,255,255,.55);}

        @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        .fu{animation:fadeUp .4s ease both;}
    </style>
</head>
<body>

<nav class="nav">
    <div class="nav-left">
        <a href="account.html" class="icon-btn" aria-label="Back">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 11.5L6 8l3.5-3.5"/></svg>
        </a>
        <a href="index.html" class="brand">BARDS</a>
    </div>
    <div class="nav-right">
        <div class="cart-wrap">
            <a href="cart.html" class="icon-btn" aria-label="Cart">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
            </a>
            <span class="cart-badge" id="cartBadge"></span>
        </div>
    </div>
</nav>

<div class="page-start"></div>

<div class="page">
    <div class="page-heading fu">
        <span class="page-title">SAVED ITEMS</span>
        <span class="page-count" id="pageCount"></span>
    </div>
    <div class="grid fu" id="grid"></div>
    <div class="empty-wrap" id="emptyWrap">
        <div class="empty-icon">🤍</div>
        <div class="empty-title">No saved items yet</div>
        <div class="empty-sub">Tap the heart icon on any product to save it here for later.</div>
        <a href="index.html" class="empty-cta">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            SHOP NOW
        </a>
    </div>
</div>

<div class="toast" id="toast">
    <div class="t-iw" id="toastIw"></div>
    <div class="t-text">
        <div class="t-title" id="toastTitle"></div>
        <div class="t-sub" id="toastSub"></div>
    </div>
</div>

<script src="products.js"></script>
<script src="api.js"></script>
<script>
let favs = [];

document.addEventListener('DOMContentLoaded', async () => {
    await fetchAndMerge().catch(() => {});
    favs = await WishlistAPI.load().catch(() => []);
    render();
    updateBadge();
});

function render() {
    const grid  = document.getElementById('grid');
    const empty = document.getElementById('emptyWrap');
    const valid = favs.filter(id => PRODUCTS[id]);
    document.getElementById('pageCount').textContent = valid.length ? `${valid.length} item${valid.length!==1?'s':''}` : '';
    if (!valid.length) { grid.innerHTML = ''; empty.classList.add('show'); return; }
    empty.classList.remove('show');
    grid.innerHTML = valid.map(id => {
        const p = PRODUCTS[id];
        return `<a href="product.html?id=${encodeURIComponent(id)}" class="p-card">
            <div class="p-card-img">
                <img src="${escapeHtml(p.images[0])}" alt="${escapeHtml(p.name)}" loading="lazy">
                <button class="p-fav" onclick="event.preventDefault();event.stopPropagation();removeFav('${id}',this)" aria-label="Remove from saved items">
                    <svg width="14" height="14" fill="currentColor" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                </button>
            </div>
            <div class="p-card-body">
                <div class="p-name">${escapeHtml(p.name)}</div>
                <div class="p-price">${fmtUSD(p.price)}</div>
            </div>
        </a>`;
    }).join('');
}

async function removeFav(id, btn) {
    btn.classList.add('loading');
    try {
        const { favs: next } = await WishlistAPI.toggle(id);
        favs = next;
        render();
        showToast('Removed', 'Removed from saved items');
    } catch(e) {
        btn.classList.remove('loading');
        showToast('Error', e.message || 'Please try again');
    }
}

let _tt;
function showToast(title, sub) {
    document.getElementById('toastTitle').textContent = title;
    document.getElementById('toastSub').textContent = sub || '';
    const t = document.getElementById('toast');
    t.classList.add('on');
    clearTimeout(_tt);
    _tt = setTimeout(() => t.classList.remove('on'), 2500);
}
</script>
</body>
</html>
