<!doctype html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bards</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --black:    #0A0A0A;
            --white:    #FAFAFA;
            --gray-50:  #F9F9F7;
            --gray-100: #F2F2F0;
            --gray-200: #E4E4E2;
            --gray-300: #C8C8C6;
            --gray-400: #8A8A88;
            --gray-600: #4A4A48;
            --orange:   #FF4F00;
            --red:      #C8001A;
            --radius:    14px;
            --radius-sm: 10px;
            --nav-h:     60px;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html { scroll-behavior:smooth; }
        body { font-family:'Space Grotesk',sans-serif; background:var(--white); color:var(--black); overscroll-behavior:none; padding-bottom:32px; }

        .nav { position:fixed; top:0; left:0; right:0; z-index:200; height:var(--nav-h); display:flex; align-items:center; justify-content:space-between; padding:0 18px; background:rgba(250,250,250,.9); backdrop-filter:blur(18px) saturate(160%); -webkit-backdrop-filter:blur(18px) saturate(160%); border-bottom:1px solid var(--gray-200); }
        .nav-left  { display:flex; align-items:center; gap:12px; }
        .nav-right { display:flex; align-items:center; gap:4px; }
        .brand { font-family:'Bebas Neue'; font-size:21px; letter-spacing:3px; color:var(--black); text-decoration:none; }
        .icon-btn { width:36px; height:36px; border-radius:50%; background:var(--gray-100); border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:background .18s,transform .12s; text-decoration:none; color:var(--black); position:relative; }
        .icon-btn:active { background:var(--gray-200); transform:scale(.9); }
        .icon-btn.search-active { background:var(--black); color:var(--white); }
        .cart-wrap { position:relative; }
        .cart-badge { position:absolute; top:-2px; right:-2px; background:var(--orange); color:#fff; font-size:8px; font-weight:700; font-family:'DM Mono',monospace; min-width:15px; height:15px; border-radius:8px; display:none; align-items:center; justify-content:center; padding:0 3px; border:1.5px solid var(--white); }

        .search-mask { display:none; position:fixed; inset:0; z-index:149; }
        .search-mask.open { display:block; }
        .search-panel { position:fixed; top:var(--nav-h); left:0; right:0; z-index:150; background:var(--white); border-bottom:1px solid var(--gray-200); padding:11px 18px 13px; transform:translateY(-110%); transition:transform .34s cubic-bezier(.22,1,.36,1); pointer-events:none; }
        .search-panel.open { transform:translateY(0); pointer-events:all; }
        .search-inner { display:flex; align-items:center; gap:10px; background:var(--gray-100); border:1.5px solid var(--gray-200); border-radius:30px; padding:0 16px; height:42px; transition:border-color .2s,background .2s; }
        .search-panel.open .search-inner:focus-within { border-color:var(--black); background:var(--white); }
        .search-inner input { flex:1; border:none; background:transparent; font-family:'Space Grotesk',sans-serif; font-size:13px; color:var(--black); outline:none; }
        .search-inner input[type="search"]::-webkit-search-decoration,
        .search-inner input[type="search"]::-webkit-search-cancel-button,
        .search-inner input[type="search"]::-webkit-search-results-button,
        .search-inner input[type="search"]::-webkit-search-results-decoration { display:none; }
        .search-inner input::placeholder { color:var(--gray-400); }
        .search-clear { background:none; border:none; cursor:pointer; color:var(--gray-400); padding:2px; display:none; align-items:center; justify-content:center; flex-shrink:0; }
        .search-clear.on { display:flex; }
        .search-hint { font-family:'DM Mono',monospace; font-size:10px; color:var(--gray-400); margin-top:8px; letter-spacing:.5px; min-height:15px; }

        .filter-strip { position:sticky; top:var(--nav-h); z-index:90; background:rgba(250,250,250,.92); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border-bottom:1px solid var(--gray-200); padding:10px 0; transition:top .34s cubic-bezier(.22,1,.36,1); }
        .filter-strip.shifted { top:calc(var(--nav-h) + 92px); }
        .filter-row { display:flex; gap:7px; padding:0 18px; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
        .filter-row::-webkit-scrollbar { display:none; }
        .f-chip { height:32px; padding:0 13px; border:1.5px solid var(--gray-200); border-radius:30px; font-size:11px; font-weight:600; cursor:pointer; background:var(--white); color:var(--gray-600); transition:background .18s,border-color .18s,color .18s; white-space:nowrap; flex-shrink:0; display:flex; align-items:center; gap:5px; font-family:'Space Grotesk',sans-serif; }
        .f-chip.on { background:var(--black); border-color:var(--black); color:#fff; }
        .f-chip:active { opacity:.7; }
        .f-count { font-family:'DM Mono',monospace; font-size:9px; background:rgba(0,0,0,.07); border-radius:8px; padding:1px 5px; }
        .f-chip.on .f-count { background:rgba(255,255,255,.18); }

        .page-start { height:var(--nav-h); }
        .section { padding:0 18px; max-width:800px; margin:0 auto; }
        .divider { border:none; border-top:1px solid var(--gray-200); margin:24px 18px; }
        .sec-hd { display:flex; align-items:center; justify-content:space-between; margin-bottom:13px; }
        .sec-hd-title { font-family:'Bebas Neue'; font-size:17px; letter-spacing:2.5px; color:var(--black); }
        .see-all { font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--gray-400); text-decoration:none; display:flex; align-items:center; gap:3px; border:none; background:none; cursor:pointer; font-family:'Space Grotesk',sans-serif; transition:color .18s; }
        .see-all:active { color:var(--black); }

        .sort-row { display:flex; align-items:center; justify-content:space-between; padding:13px 18px 6px; max-width:800px; margin:0 auto; }
        .sort-results { font-family:'DM Mono',monospace; font-size:10px; color:var(--gray-400); letter-spacing:.5px; }
        .sort-btn { height:28px; padding:0 12px; border:1.5px solid var(--gray-200); border-radius:20px; font-size:11px; font-weight:600; cursor:pointer; background:var(--white); color:var(--gray-600); display:flex; align-items:center; gap:5px; font-family:'Space Grotesk',sans-serif; transition:all .18s; }
        .sort-btn:active { background:var(--gray-100); }
        .sort-btn.active { background:var(--black); border-color:var(--black); color:#fff; }

        .p-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        .p-card { background:var(--white); border-radius:var(--radius); border:1px solid var(--gray-200); overflow:hidden; cursor:pointer; display:flex; flex-direction:column; text-decoration:none; color:inherit; position:relative; transition:transform .22s,box-shadow .22s; }
        .p-card:active { transform:scale(.975); box-shadow:0 6px 24px rgba(0,0,0,.09); }
        .p-card.wide { grid-column:1/-1; }
        .p-card-img { aspect-ratio:1/1; overflow:hidden; background:var(--gray-100); position:relative; }
        .p-card.wide .p-card-img { aspect-ratio:2/1; }
        .p-card-img img { width:100%; height:100%; object-fit:cover; display:block; transition:transform .38s ease; }
        .p-card:active .p-card-img img { transform:scale(1.04); }
        .p-tag { position:absolute; top:9px; left:9px; z-index:2; background:var(--black); color:#fff; font-family:'DM Mono',monospace; font-size:8px; letter-spacing:1.5px; text-transform:uppercase; padding:3px 9px; border-radius:20px; }
        .p-tag.light { background:var(--white); color:var(--black); }
        .p-tag.low-stock { background:var(--gray-600); color:#fff; top:auto; bottom:9px; }
        .p-card-body { padding:10px 11px 13px; flex:1; display:flex; flex-direction:column; gap:7px; }
        .p-name { font-size:12px; font-weight:600; line-height:1.35; letter-spacing:-.1px; }
        .p-card.wide .p-name { font-size:14px; }
        .p-meta { display:flex; align-items:center; justify-content:space-between; }
        .p-price { font-family:'DM Mono',monospace; font-size:13px; font-weight:500; color:var(--red); }
        .p-colors { display:flex; gap:4px; }
        .p-dot { width:10px; height:10px; border-radius:50%; border:1.5px solid rgba(255,255,255,.7); box-shadow:0 0 0 1px rgba(0,0,0,.12); }

        .empty { padding:60px 20px; text-align:center; display:none; }
        .empty.show { display:block; }
        .empty-icon { font-size:36px; margin-bottom:12px; }
        .empty-title { font-size:15px; font-weight:600; }
        .empty-sub { font-size:12px; color:var(--gray-400); margin-top:5px; line-height:1.65; }

        .na-scroll { overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; padding:0 18px 4px; }
        .na-scroll::-webkit-scrollbar { display:none; }
        .na-row { display:flex; flex-direction:row; gap:10px; width:max-content; }
        .na-row .p-card { width:calc((100vw - 46px) / 2); flex-shrink:0; }
        .na-row .p-card .p-card-img { aspect-ratio:1/1; }

        .cat-grid { display:grid; grid-template-columns:1fr 1fr; gap:9px; }
        .cat-card { border-radius:var(--radius-sm); aspect-ratio:4/3; position:relative; overflow:hidden; cursor:pointer; transition:transform .3s ease; }
        .cat-card:active { transform:scale(.97); }
        .cat-info { position:absolute; bottom:10px; left:12px; right:12px; display:flex; align-items:flex-end; justify-content:space-between; }
        .cat-name { font-family:'Bebas Neue'; font-size:17px; letter-spacing:2px; color:#fff; }
        .cat-count { font-family:'DM Mono',monospace; font-size:8px; color:rgba(255,255,255,.55); }
        .cat-arrow { position:absolute; top:9px; right:9px; width:24px; height:24px; border-radius:50%; background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.22); display:flex; align-items:center; justify-content:center; color:#fff; }

        .toast { position:fixed; bottom:32px; left:50%; transform:translateX(-50%) translateY(6px); background:var(--black); color:#fff; padding:12px 18px 12px 14px; border-radius:14px; font-size:13px; font-weight:500; z-index:9999; opacity:0; transition:opacity .28s,transform .28s; white-space:nowrap; display:flex; align-items:center; gap:10px; pointer-events:none; box-shadow:0 8px 24px rgba(0,0,0,.28); min-width:220px; }
        .toast.on { opacity:1; transform:translateX(-50%) translateY(0); }
        .toast-icon { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; background:rgba(255,255,255,.1); }
        .toast-text { display:flex; flex-direction:column; gap:1px; }
        .toast-title { font-size:12px; font-weight:700; letter-spacing:.3px; }
        .toast-sub   { font-size:11px; color:rgba(255,255,255,.55); }

        @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
        .fu { animation:fadeUp .42s ease both; }
        .d1 { animation-delay:.06s; } .d2 { animation-delay:.12s; }
        .d3 { animation-delay:.18s; } .d4 { animation-delay:.24s; }
    </style>
</head>
<body>

<nav class="nav">
    <div class="nav-left">
        <a href="index.html" class="brand">BARDS</a>
    </div>
    <div class="nav-right">
        <button class="icon-btn" id="searchBtn" onclick="toggleSearch()" aria-label="Search">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="6.5" cy="6.5" r="5.5"/><line x1="11" y1="11" x2="14" y2="14"/></svg>
        </button>
        <a href="account.html" class="icon-btn" aria-label="Account">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </a>
        <div class="cart-wrap">
            <a href="cart.html" class="icon-btn" aria-label="Cart">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
            </a>
            <span class="cart-badge" id="cartBadge"></span>
        </div>

</nav>

<div class="search-mask" id="searchMask" onclick="toggleSearch()"></div>
<div class="search-panel" id="searchPanel">
    <div class="search-inner">
        <input type="search" id="searchInput" placeholder="ค้นหาสินค้า เช่น tee, hoodie, cargo…" oninput="onSearch(this.value)" autocomplete="off" spellcheck="false">
        <button class="search-clear" id="searchClearBtn" onclick="clearSearch()">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="1" y1="1" x2="12" y2="12"/><line x1="12" y1="1" x2="1" y2="12"/></svg>
        </button>

</div>

<div class="filter-strip" id="filterStrip">
    <div class="filter-row" id="filterRow">
        <div class="f-chip on" data-filter="all"        onclick="setFilter(this,'all')">All <span class="f-count" id="cnt-all">0</span></div>
        <div class="f-chip"   data-filter="tops"        onclick="setFilter(this,'tops')">Tops <span class="f-count" id="cnt-tops">0</span></div>
        <div class="f-chip"   data-filter="pants"       onclick="setFilter(this,'pants')">Pants <span class="f-count" id="cnt-pants">0</span></div>
        <div class="f-chip"   data-filter="accessories" onclick="setFilter(this,'accessories')">Accessories <span class="f-count" id="cnt-accessories">0</span></div>
    </div>
</div>

<div class="page-start"></div>

<div class="sort-row fu d1">
    <span class="sort-results" id="resultsLabel">0 Products</span>
    <button class="sort-btn" id="sortBtn" onclick="cycleSort()">
        <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M1 3h9M3 6.5h5M5.5 10h1"/></svg>
        <span id="sortLabel">Sort</span>

</div>

<div class="section fu d2" style="margin-top:4px;" id="featuredSection">
    <div class="sec-hd">
        <span class="sec-hd-title" id="featuredTitle">Featured</span>
        <a class="see-all" id="featuredSeeAll" href="all-products.html" style="display:none">See all →</a>

    <div class="empty" id="emptyState">
        <div class="empty-icon">🔍</div>
        <div class="empty-title">ไม่พบสินค้า</div>
        <div class="empty-sub">ลองคำค้นอื่น หรือเลือก filter อื่น</div>
    </div>
</div>

<hr class="divider">

<div id="newSection" class="fu d3">
    <div class="section">
        <div class="sec-hd">
            <span class="sec-hd-title">New Arrivals</span>
            <a href="new-arrival.html" class="see-all">See all →</a>
        </div>
    </div>
    <div class="na-scroll">
        <div class="na-row" id="newRow"></div>
    </div>
</div>

<hr class="divider">

<div class="section fu d4" id="catSection">
    <div class="sec-hd">
        <span class="sec-hd-title">Categories</span>
    </div>
    <div class="cat-grid" id="catGrid"></div>
</div>

<div style="height:32px"></div>

<div class="toast" id="toast">
    <div class="toast-icon" id="toastIcon"></div>
    <div class="toast-text">
        <div class="toast-title" id="toastTitle"></div>
        <div class="toast-sub"   id="toastSub"></div>
    </div>
</div>

<script src="/api.js"></script>
<script src="/products.js"></script>
<script>
/* index.html — ข้อมูลสินค้าจาก products.js (Single Source) */

const CATEGORIES_EXTRA = CATEGORIES; // ใช้จาก products.js

const SORT_OPTS = [
    { label:'Sort',    fn:null },
    { label:'Price ↑', fn:([,a],[,b]) => a.price - b.price },
    { label:'Price ↓', fn:([,a],[,b]) => b.price - a.price },
    { label:'A → Z',   fn:([,a],[,b]) => a.name.localeCompare(b.name,'th') },
];

const NEW_ARRIVALS_MAX = 16;
const FEATURED_MAX     = 16;

const S = {
    filter:'all', query:'', sort:0
};

document.addEventListener('DOMContentLoaded', async () => {
    // โหลดสินค้าจาก DB ก่อน (สำคัญ! ไม่งั้นจะเห็นแค่ local PRODUCTS)
    await fetchAndMerge().catch(() => {});
    updateCounts(); restoreSearch(); renderGrid(); renderNewArrivals(); renderCategories(); updateBadge();
});

/* SEARCH */
let _searchOpen = false;
function toggleSearch() {
    _searchOpen = !_searchOpen;
    document.getElementById('searchPanel').classList.toggle('open', _searchOpen);
    document.getElementById('searchMask').classList.toggle('open', _searchOpen);
    document.getElementById('filterStrip').classList.toggle('shifted', _searchOpen);
    document.getElementById('searchBtn').classList.toggle('search-active', _searchOpen);
    if (_searchOpen) setTimeout(() => document.getElementById('searchInput').focus(), 340);
}
function onSearch(val) {
    S.query = val.toLowerCase().trim();
    document.getElementById('searchClearBtn').classList.toggle('on', val.length > 0);
    sessionStorage.setItem('BARDS_SEARCH', val);
    renderGrid();
}
function clearSearch() {
    S.query = '';
    const inp = document.getElementById('searchInput'); if (inp) inp.value = '';
    document.getElementById('searchClearBtn').classList.remove('on');
    document.getElementById('searchHint').innerText = '';
    sessionStorage.removeItem('BARDS_SEARCH');
    renderGrid();
}
function restoreSearch() {
    const saved = sessionStorage.getItem('BARDS_SEARCH'); if (!saved) return;
    S.query = saved.toLowerCase().trim();
    const inp = document.getElementById('searchInput'); if (inp) inp.value = saved;
    document.getElementById('searchClearBtn').classList.toggle('on', saved.length > 0);
    _searchOpen = true;
    ['searchPanel','searchMask'].forEach(id => document.getElementById(id).classList.add('open'));
    document.getElementById('filterStrip').classList.add('shifted');
    document.getElementById('searchBtn').classList.add('search-active');
}

/* FILTER */
function setFilter(el, filter) {
    S.filter = filter;
    document.querySelectorAll('.f-chip').forEach(c => c.classList.toggle('on', c.dataset.filter === filter));
    renderGrid();
}

/* SORT */
function cycleSort() {
    S.sort = (S.sort + 1) % SORT_OPTS.length;
    document.getElementById('sortLabel').innerText = SORT_OPTS[S.sort].label;
    document.getElementById('sortBtn').classList.toggle('active', S.sort > 0);
    renderGrid();
}

/* ITEMS */
function getItems() {
    let items = Object.entries(PRODUCTS);
    if (S.filter !== 'all') items = items.filter(([,p]) => p.category === S.filter);
    if (S.query) items = items.filter(([id,p]) =>
        p.name.toLowerCase().includes(S.query) || p.category.toLowerCase().includes(S.query) ||
        (p.tag||'').toLowerCase().includes(S.query) || id.toLowerCase().includes(S.query) ||
        p.colors.some(c => c.name.toLowerCase().includes(S.query))
    );
    const fn = SORT_OPTS[S.sort].fn; if (fn) items = [...items].sort(fn);
    return items;
}

/* RENDER GRID */
function renderGrid() {
    const allItems = getItems();
    const items    = allItems.slice(0, FEATURED_MAX);
    const n        = allItems.length;
    document.getElementById('resultsLabel').innerText = S.query ? `${n} result${n!==1?'s':''} — "${S.query}"` : `${n} Product${n!==1?'s':''}`;
    const hint = document.getElementById('searchHint');
    if (S.query) hint.innerText = n > 0 ? `พบ ${n} รายการ` : 'ไม่พบสินค้า — ลองคำค้นอื่น';
    else hint.innerText = '';
    const catInfo = CATEGORIES.find(c => c.id === S.filter);
    document.getElementById('featuredTitle').innerText = catInfo ? catInfo.label : 'Featured';
    document.getElementById('featuredSeeAll').href     = catInfo ? catInfo.url : 'all-products.html';
    document.getElementById('featuredSeeAll').style.display = 'flex';
    const grid  = document.getElementById('productGrid');
    const empty = document.getElementById('emptyState');
    if (!n) { grid.innerHTML=''; empty.classList.add('show'); return; }
    empty.classList.remove('show');
    grid.innerHTML = items.map(([id,p],i) => cardHTML(id,p,i===0&&items.length>=2)).join('');
}

/* CARD HTML */
function cardHTML(id, p, wide) {
    const dots  = p.colors.map(c => `<div class="p-dot" style="background:${c.hex}"></div>`).join('');
    const low   = p.stock==='low-stock' ? `<div class="p-tag low-stock">LOW STOCK</div>` : '';
    return `
<a href="product.html?id=${id}" class="p-card${wide?' wide':''}">
    <div class="p-card-img">
        <img src="${escapeHtml(p.images[0])}" alt="${escapeHtml(p.name)}" loading="lazy">
        <div class="p-tag${p.tagLight?' light':''}">${p.tag}</div>${low}
    </div>
    <div class="p-card-body">
        <div class="p-name">${escapeHtml(p.name)}</div>
        <div class="p-meta"><div class="p-price">${fmtUSD(p.price)}</div><div class="p-colors">${dots}</div></div>
    </div>
</a>`;
}

/* NEW ARRIVALS */
function renderNewArrivals() {
    const all = Object.entries(PRODUCTS).filter(([,p])=>p.isNew)
        .sort(([,a],[,b])=>new Date(b.dateAdded)-new Date(a.dateAdded))
        .slice(0, NEW_ARRIVALS_MAX);
    if (!all.length) { document.getElementById('newSection').style.display='none'; return; }
    document.getElementById('newRow').innerHTML = all.map(([id,p])=>cardHTML(id,p,false)).join('');
}

/* CATEGORIES */
function renderCategories() {
    const countMap={};
    Object.values(PRODUCTS).forEach(p=>{ countMap[p.category]=(countMap[p.category]||0)+1; });
    document.getElementById('catGrid').innerHTML = CATEGORIES.map(cat=>`
<div class="cat-card" style="background:${cat.color}" onclick="window.location.href='${cat.url}'">
    <div class="cat-arrow"><svg width="9" height="9" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4.5h7M5 1.5l3 3-3 3"/></svg></div>
    <div class="cat-info">
        <span class="cat-name">${cat.label.toUpperCase()}</span>
        <span class="cat-count">${countMap[cat.id]||0} items</span>
    </div>
</div>`).join('');
}

/* COUNTS */
function updateCounts() {
    const all=Object.values(PRODUCTS);
    document.getElementById('cnt-all').innerText         = all.length;
    document.getElementById('cnt-tops').innerText        = all.filter(p=>p.category==='tops').length;
    document.getElementById('cnt-pants').innerText       = all.filter(p=>p.category==='pants').length;
    document.getElementById('cnt-accessories').innerText = all.filter(p=>p.category==='accessories').length;
}

/* TOAST */
const ICON_OK=`<svg width="13" height="13" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="11 3 5 10 2 7"/></svg>`;
let _tt;
function showToast(title, sub) {
    document.getElementById('toastIcon').innerHTML=ICON_OK;
    document.getElementById('toastTitle').innerText=title;
    document.getElementById('toastSub').innerText=sub||'';
    const t=document.getElementById('toast'); t.classList.add('on');
    clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('on'),2700);
}
</script>
</body>
