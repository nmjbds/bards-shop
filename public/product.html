<!doctype html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Product — Bards</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #0A0A0A;
            --white: #FAFAFA;
            --orange: #FF4F00;
            --green: #16A34A;
            --gray-50: #F9F9F7;
            --gray-100: #F2F2F0;
            --gray-200: #E4E4E2;
            --gray-300: #C8C8C6;
            --gray-400: #8A8A88;
            --gray-600: #4A4A48;
            --radius: 14px;
            --radius-sm: 10px;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:'Space Grotesk',sans-serif; background:var(--white); color:var(--black); padding-bottom:96px; overscroll-behavior:none; }

        /* NAV */
        .nav { position:fixed; top:0; left:0; right:0; z-index:100; height:60px; display:flex; align-items:center; justify-content:space-between; padding:0 18px; background:rgba(250,250,250,0.9); backdrop-filter:blur(18px) saturate(160%); -webkit-backdrop-filter:blur(18px) saturate(160%); border-bottom:1px solid var(--gray-200); }
        .nav-left { display:flex; align-items:center; gap:12px; }
        .icon-btn { width:36px; height:36px; border-radius:50%; background:var(--gray-100); border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:background .18s,transform .12s; text-decoration:none; color:var(--black); }
        .icon-btn:active { background:var(--gray-200); transform:scale(0.9); }
        .brand { font-family:'Bebas Neue'; font-size:21px; letter-spacing:3px; color:var(--black); text-decoration:none; }
        .cart-wrap { position:relative; }
        .cart-badge { position:absolute; top:-2px; right:-2px; background:var(--orange); color:#fff; font-size:8px; font-weight:700; font-family:'DM Mono',monospace; min-width:15px; height:15px; border-radius:8px; display:none; align-items:center; justify-content:center; padding:0 3px; border:1.5px solid var(--white); }

        /* GALLERY */
        .gallery-wrap { margin-top:60px; position:relative; }
        .gallery-viewport { width:100%; aspect-ratio:1/1; overflow:hidden; background:var(--gray-100); touch-action:pan-y; position:relative; }
        .gallery-track { display:flex; height:100%; transition:transform .42s cubic-bezier(.22,1,.36,1); will-change:transform; }
        .g-slide { min-width:100%; height:100%; }
        .g-slide img { width:100%; height:100%; object-fit:cover; cursor:zoom-in; display:block; }
        .g-tag { position:absolute; top:14px; left:14px; z-index:5; background:var(--black); color:#fff; font-family:'DM Mono',monospace; font-size:9px; letter-spacing:1.5px; text-transform:uppercase; padding:4px 10px; border-radius:20px; }
        .g-tag.orange { background:var(--orange); }
        .g-dots { position:absolute; bottom:14px; left:50%; transform:translateX(-50%); display:flex; gap:5px; z-index:5; }
        .g-dot { width:5px; height:5px; border-radius:50%; background:rgba(255,255,255,.45); transition:all .28s ease; }
        .g-dot.on { width:18px; border-radius:3px; background:#fff; }
        .g-counter { position:absolute; bottom:14px; right:14px; z-index:5; font-family:'DM Mono',monospace; font-size:10px; color:rgba(255,255,255,.7); background:rgba(0,0,0,.3); padding:3px 8px; border-radius:10px; }
        .g-fav { position:absolute; top:14px; right:14px; z-index:6; width:34px; height:34px; border-radius:50%; background:rgba(255,255,255,.9); border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:transform .15s,background .18s; color:var(--gray-600); box-shadow:0 2px 8px rgba(0,0,0,.1); }
        .g-fav:active { transform:scale(.88); }
        .g-fav.liked { background:var(--black); color:#fff; }

        /* Desktop gallery nav (hidden on touch/small screens — swipe still works there) */
        .g-arrow { display:none; }
        @media (hover:hover) and (pointer:fine) {
            .g-slide img { cursor:pointer; }
            .g-arrow {
                display:flex; position:absolute; top:50%; transform:translateY(-50%); z-index:6;
                width:38px; height:38px; border-radius:50%; background:rgba(255,255,255,.9); border:none;
                align-items:center; justify-content:center; cursor:pointer; color:var(--black);
                opacity:0; transition:opacity .18s,background .18s; box-shadow:0 2px 10px rgba(0,0,0,.12);
            }
            .gallery-viewport:hover .g-arrow { opacity:1; }
            .g-arrow:hover { background:#fff; }
            .g-arrow.prev { left:14px; }
            .g-arrow.next { right:14px; }
            .g-arrow:disabled { opacity:0!important; pointer-events:none; }
        }

        /* BODY */
        .p-body { padding:20px 18px 0; max-width:800px; margin:0 auto; }
        .price-line { display:flex; align-items:baseline; gap:8px; }
        .price { font-family:'DM Mono',monospace; font-size:32px; font-weight:500; color:#C8001A; line-height:1; }
        .price-currency { font-size:12px; color:var(--gray-400); font-weight:500; letter-spacing:.5px; }
        .p-name { font-size:17px; font-weight:600; margin-top:7px; line-height:1.35; color:var(--black); letter-spacing:-.2px; }
        .meta-line { display:flex; align-items:center; gap:8px; margin-top:9px; flex-wrap:wrap; }
        .meta-chip { font-size:10px; font-weight:600; padding:3px 8px; border-radius:6px; }
        .chip-green { background:#DCFCE7; color:var(--green); }
        .chip-amber { background:#FEF3C7; color:#B45309; }
        .chip-gray { background:var(--gray-100); color:var(--gray-400); }

        /* DIVIDER */
        .divider { margin:18px 18px; border:none; border-top:1px solid var(--gray-200); }

        /* OPTIONS */
        .opts { padding:0 18px; max-width:800px; margin:0 auto; }
        .opt-row { margin-bottom:16px; }
        .opt-label { font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--gray-400); margin-bottom:9px; display:flex; align-items:center; gap:6px; }
        .opt-selected { font-size:10px; font-weight:600; color:var(--black); text-transform:none; letter-spacing:0; }
        .color-row { display:flex; gap:8px; flex-wrap:wrap; }
        .c-swatch { width:30px; height:30px; border-radius:50%; cursor:pointer; transition:transform .18s,box-shadow .18s; position:relative; flex-shrink:0; }
        .c-swatch.on { box-shadow:0 0 0 2.5px var(--white), 0 0 0 4.5px var(--black); }
        .c-swatch:active { transform:scale(0.88); }
        .size-row { display:flex; gap:7px; flex-wrap:wrap; }
        .s-pill { height:36px; padding:0 16px; border:1.5px solid var(--gray-200); border-radius:30px; font-size:12px; font-weight:600; cursor:pointer; background:var(--white); color:var(--gray-600); transition:all .18s; display:flex; align-items:center; }
        .s-pill.on { background:var(--black); border-color:var(--black); color:#fff; }
        .s-pill:active { transform:scale(0.94); }

        /* DESC */
        .desc-section { padding:0 18px; max-width:800px; margin:0 auto; }
        .sec-title { font-family:'Bebas Neue'; font-size:17px; letter-spacing:2.5px; color:var(--black); display:flex; align-items:center; gap:10px; }
        .sec-title::after { content:''; flex:1; height:1px; background:var(--gray-200); }
        .desc-text { font-size:13px; color:var(--gray-600); line-height:1.75; margin-top:10px; }
        .specs { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:14px; }
        .spec-tile { background:var(--gray-50); border-radius:var(--radius-sm); padding:13px; border:1px solid var(--gray-200); }
        .spec-tile-label { font-size:9px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--gray-400); }
        .spec-tile-val { font-size:13px; font-weight:600; margin-top:4px; color:var(--black); }

        /* ACTION BAR */
        .action-bar { position:fixed; bottom:0; left:0; right:0; z-index:200; background:rgba(250,250,250,0.93); backdrop-filter:blur(20px) saturate(160%); -webkit-backdrop-filter:blur(20px) saturate(160%); border-top:1px solid var(--gray-200); height:80px; display:none; align-items:center; padding:0 18px; gap:10px; max-width:800px; margin:0 auto; }
        .seller-col { display:flex; flex-direction:column; align-items:center; min-width:46px; gap:3px; }
        .seller-ava { width:36px; height:36px; border-radius:50%; border:1.5px solid var(--gray-200); object-fit:cover; background:#0A0A0A; color:#fff; display:flex; align-items:center; justify-content:center; font-family:'Bebas Neue'; font-size:13px; letter-spacing:.5px; }
        .seller-nm { font-size:8px; font-weight:700; letter-spacing:.5px; color:var(--gray-400); text-transform:uppercase; }
        .btn-add { flex:1; height:48px; border:none; border-radius:var(--radius-sm); font-family:'Bebas Neue'; font-size:16px; letter-spacing:2px; cursor:pointer; transition:opacity .18s,transform .12s; display:flex; align-items:center; justify-content:center; gap:6px; background:var(--black); color:#fff; }
        .btn-add:active { opacity:.78; transform:scale(0.97); }

        /* SHEET */
        .mask { position:fixed; inset:0; z-index:300; background:rgba(10,10,10,.55); display:none; opacity:0; transition:opacity .32s ease; backdrop-filter:blur(3px); -webkit-backdrop-filter:blur(3px); }
        .mask.on { opacity:1; }
        .sheet { position:fixed; bottom:-100%; left:0; right:0; z-index:301; background:var(--white); border-radius:24px 24px 0 0; padding:8px 20px 40px; transition:bottom .4s cubic-bezier(.22,1,.36,1); max-width:800px; margin:0 auto; box-shadow:0 -4px 30px rgba(0,0,0,.1); }
        .sheet.on { bottom:0; }
        .sheet-handle { width:38px; height:4px; border-radius:2px; background:var(--gray-200); margin:10px auto 20px; }
        .sheet-header { display:flex; gap:14px; align-items:flex-end; margin-bottom:22px; }
        .sheet-thumb { width:72px; height:72px; border-radius:var(--radius-sm); object-fit:cover; border:1px solid var(--gray-200); }
        .sheet-price { font-family:'DM Mono',monospace; font-size:24px; font-weight:500; color:#C8001A; }
        .sheet-hint { font-size:10px; color:var(--gray-400); font-weight:600; letter-spacing:1.5px; text-transform:uppercase; margin-top:5px; }
        .sh-label { font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--gray-400); margin-bottom:10px; }
        .sh-chips { display:flex; gap:7px; flex-wrap:wrap; margin-bottom:18px; }
        .sh-chip { height:36px; padding:0 15px; border:1.5px solid var(--gray-200); border-radius:30px; font-size:12px; font-weight:600; background:var(--white); color:var(--gray-600); cursor:pointer; transition:all .18s; display:flex; align-items:center; }
        .sh-chip.on { background:var(--black); border-color:var(--black); color:#fff; }
        .sh-chip:active { transform:scale(0.94); }
        .qty-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
        .qty-control { display:flex; align-items:center; }
        .qty-btn { width:36px; height:36px; border:1.5px solid var(--gray-200); background:var(--white); border-radius:9px; cursor:pointer; font-size:17px; color:var(--black); display:flex; align-items:center; justify-content:center; transition:background .15s,transform .1s; }
        .qty-btn:active { background:var(--gray-100); transform:scale(0.88); }
        .qty-val { width:46px; text-align:center; font-family:'DM Mono',monospace; font-size:16px; font-weight:500; }

        /* CONFIRM BUTTON STATES */
        .confirm-btn { width:100%; height:54px; border:none; border-radius:var(--radius-sm); font-family:'Bebas Neue'; font-size:19px; letter-spacing:2.5px; cursor:pointer; transition:background .25s,transform .12s; display:flex; align-items:center; justify-content:center; gap:8px; }
        .confirm-btn.idle { background:var(--black); color:#fff; }
        .confirm-btn.idle:active { opacity:.82; transform:scale(.98); }
        .confirm-btn.loading { background:var(--gray-200); color:var(--gray-400); pointer-events:none; }
        .confirm-btn.success { background:var(--green); color:#fff; pointer-events:none; }

        /* FULLSCREEN GALLERY */
        #fgView { position:fixed; inset:0; z-index:500; background:#000; display:none; flex-direction:column; }
        .fg-top { padding:14px 18px; display:flex; justify-content:space-between; align-items:center; }
        .fg-count { font-family:'DM Mono',monospace; font-size:12px; color:rgba(255,255,255,.5); }
        .fg-close { width:36px; height:36px; border-radius:50%; background:rgba(255,255,255,.1); border:none; color:#fff; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
        .fg-track { flex:1; display:flex; align-items:center; transition:transform .4s cubic-bezier(.22,1,.36,1); }
        .fg-slide { min-width:100%; display:flex; align-items:center; justify-content:center; }
        .fg-slide img { width:100%; aspect-ratio:1/1; object-fit:cover; display:block; border-radius:0; }

        /* TOAST */
        .toast { position:fixed; bottom:96px; left:50%; transform:translateX(-50%) translateY(6px); background:var(--black); color:#fff; padding:12px 18px 12px 14px; border-radius:14px; font-size:13px; font-weight:500; z-index:9999; opacity:0; transition:opacity .28s,transform .28s; white-space:nowrap; display:flex; align-items:center; gap:10px; pointer-events:none; box-shadow:0 8px 24px rgba(0,0,0,.28); min-width:220px; }
        .toast.on { opacity:1; transform:translateX(-50%) translateY(0); }
        .toast-icon-wrap { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
        .toast-icon-wrap.success { background:rgba(22,163,74,.25); }
        .toast-icon-wrap.warn    { background:rgba(234,179,8,.2); }
        .toast-text { display:flex; flex-direction:column; gap:1px; }
        .toast-title { font-size:12px; font-weight:700; letter-spacing:.3px; }
        .toast-sub   { font-size:11px; color:rgba(255,255,255,.55); font-weight:400; }

        /* ANIM */
        @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
        @keyframes spin { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
        .fu { animation:fadeUp .4s ease both; }
        .d1 { animation-delay:.07s; } .d2 { animation-delay:.14s; } .d3 { animation-delay:.21s; }

        /* NOT FOUND */
        .not-found { padding:80px 20px; text-align:center; }
        .not-found-icon { font-size:44px; margin-bottom:14px; }
        .not-found-title { font-size:16px; font-weight:600; }
        .not-found-msg { font-size:13px; color:var(--gray-400); margin-top:6px; }
    </style>
</head>
<body>

<nav class="nav">
    <div class="nav-left">
        <button class="icon-btn" onclick="history.back()">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 11.5L6 8l3.5-3.5"/></svg>
        </button>
        <a href="index.html" class="brand">Bards</a>
    </div>
    <div class="cart-wrap">
        <a href="cart.html" class="icon-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
            </svg>
        </a>
        <span class="cart-badge" id="cartBadge"></span>
    </div>
</nav>

<div id="productWrap"></div>

<div class="action-bar" id="actionBar">
    <div class="seller-col">
        <div class="seller-ava" id="sellerAva">BD</div>
        <span class="seller-nm">BARDS</span>
    </div>
    <button class="btn-add" onclick="openSheet()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg> ADD TO CART
    </button>
</div>

<div class="mask" id="mask" onclick="hideSheet()"></div>
<div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
        <img src="" id="sheetThumb" class="sheet-thumb">
        <div>
            <div class="sheet-price" id="sheetPrice">$0.00</div>
            <div class="sheet-hint">Select Options</div>
        </div>
    </div>
    <p class="sh-label">Color</p>
    <div class="sh-chips" id="colorChips"></div>
    <p class="sh-label">Size</p>
    <div class="sh-chips" id="sizeChips"></div>
    <div class="qty-row">
        <p class="sh-label" style="margin-bottom:0">Quantity</p>
        <div class="qty-control">
            <button class="qty-btn" onclick="changeQty(-1)">−</button>
            <div class="qty-val" id="qtyVal">1</div>
            <button class="qty-btn" onclick="changeQty(1)">+</button>
        </div>
    </div>
    <button class="confirm-btn idle" id="confirmBtn" onclick="handleConfirm()">CONFIRM ORDER</button>
</div>

<div id="fgView">
    <div class="fg-top">
        <span class="fg-count" id="fgCount">1 / 1</span>
        <button class="fg-close" onclick="closeFg()">✕</button>
    </div>
    <div class="fg-track" id="fgTrack"></div>
</div>

<div class="toast" id="toast">
    <div class="toast-icon-wrap" id="toastIconWrap"></div>
    <div class="toast-text">
        <div class="toast-title" id="toastTitle">Done</div>
        <div class="toast-sub"  id="toastSub"></div>
    </div>
</div>

<script src="/api.js"></script>
<script src="/products.js"></script>
<script>
/* product.html — สินค้าจาก products.js */

/* ─── STATE ─── */
let P = null, imgIdx = 0, selColor = null, selSize = null, qty = 1;

const PRODUCT_ID = new URLSearchParams(window.location.search).get('id') || '';

/* ─── UTIL: format USD without comma ─── */
function fmtUSD(num) { return '$' + Number(num).toFixed(2); }

/* ─── INIT ─── */
async function init() {
    // ลอง fetch จาก API ก่อน (ได้สินค้าจาก DB)
    // ถ้า fail หรือไม่เจอ → fallback ใช้ PRODUCTS static
    try {
        const d = await apiFetch('/products/' + encodeURIComponent(PRODUCT_ID));
        if (d && d.product) P = normalizeProduct(d.product);
    } catch(e) {}

    if (!P) P = PRODUCTS[PRODUCT_ID] || null;

    if (!P) {
        document.getElementById('productWrap').innerHTML = `
            <div class="not-found">
                <div class="not-found-icon">🔍</div>
                <div class="not-found-title">Product not found</div>
                <div class="not-found-msg">ID "${PRODUCT_ID}" does not exist in our catalog.</div>
            </div>`;
        return;
    }
    document.title = `${P.name} — Bards`;
    buildPage();
    updateBadge();
    initWishlist();
}

/* ─── WISHLIST (Save button) ─── */
let isFav = false;
async function initWishlist() {
    try {
        const favs = await WishlistAPI.load();
        isFav = favs.includes(PRODUCT_ID);
    } catch(e) { isFav = false; }
    renderSaveBtn();
}
function renderSaveBtn() {
    const btn = document.getElementById('saveBtn');
    if (!btn) return;
    btn.classList.toggle('liked', isFav);
    const svg = btn.querySelector('svg');
    svg.setAttribute('fill', isFav ? 'currentColor' : 'none');
}
async function toggleWish() {
    const btn = document.getElementById('saveBtn');
    btn.disabled = true;
    try {
        const { added } = await WishlistAPI.toggle(PRODUCT_ID);
        isFav = added;
        renderSaveBtn();
        showToast('ok', added ? 'Saved!' : 'Removed', added ? 'Added to Wishlist ❤️' : 'Removed from Wishlist');
    } catch(e) {
        showToast('warn', 'Error', e.message || 'Try again');
    } finally {
        btn.disabled = false;
    }
}

/* normalize ข้อมูลจาก DB ให้ตรงกับ format ที่ buildPage() ใช้ */
function normalizeProduct(p) {
    // colors: ['black','blue'] → [{name:'black', hex:'#888888'}]
    const parseColors = v => {
        if (!Array.isArray(v)) return [];
        return v.map(c => typeof c === 'object' ? c : { name: c, hex: '#888888' });
    };
    // sizes: ['s','m','l'] → ['S','M','L']
    const parseSizes = v => {
        if (!Array.isArray(v)) return [];
        return v.map(s => String(s).toUpperCase());
    };
    return {
        ...p,
        name:   p.name || '',
        price:  Number(p.price) || 0,
        images: Array.isArray(p.images) && p.images.length ? p.images : [''],
        colors: parseColors(p.colors),
        sizes:  parseSizes(p.sizes),
        desc:   p.description || p.desc || '',
        tag:    p.is_new ? 'NEW' : (p.sale_price ? 'SALE' : ''),
        stock:  p.stock != null ? (p.stock > 10 ? 'in-stock' : p.stock > 0 ? 'low-stock' : 'out-of-stock') : 'in-stock',
        specs:  p.specs || null,
    };
}

/* ─── BUILD PAGE ─── */
function buildPage() {
    const stockMap = { 'in-stock':['chip-green','In Stock'], 'low-stock':['chip-amber','Low Stock'], 'out-of-stock':['chip-gray','Out of Stock'] };
    const [stockCls, stockLabel] = stockMap[P.stock] || stockMap['in-stock'];
    const multiImg = P.images.length > 1;

    /* price เป็น USD ตรงๆ แล้ว — ไม่หาร 33 */
    const priceDisplay = fmtUSD(P.price);

    const slidesHtml = P.images.map((s,i) => `<div class="g-slide"><img src="${escapeHtml(s)}" onclick="openFg(${i})" loading="${i?'lazy':'eager'}"></div>`).join('');
    const fgHtml     = P.images.map(s => `<div class="fg-slide"><img src="${escapeHtml(s)}"></div>`).join('');
    const dotsHtml   = multiImg ? P.images.map((_,i) => `<div class="g-dot${i?'':' on'}"></div>`).join('') : '';
    const colorHtml  = P.colors.map((c,i) => `<div class="c-swatch" style="background:${c.hex}" title="${escapeHtml(c.name)}" data-idx="${i}" onclick="pickColor(this,${i})"></div>`).join('');
    const sizeHtml   = P.sizes.map(s  => `<div class="s-pill" data-size="${s}" onclick="pickSize(this,'${s}')">${s}</div>`).join('');
    const specsHtml  = P.specs ? Object.entries(P.specs).map(([k,v]) => `<div class="spec-tile"><div class="spec-tile-label">${escapeHtml(k)}</div><div class="spec-tile-val">${escapeHtml(v)}</div></div>`).join('') : '';

    document.getElementById('productWrap').innerHTML = `
        <div class="gallery-wrap fu">
            <div class="gallery-viewport" id="gvp">
                <div class="gallery-track" id="gtrack">${slidesHtml}</div>
                <div class="g-tag${P.tagOrange?' orange':''}">${P.tag}</div>
                <button class="g-fav" id="saveBtn" onclick="event.stopPropagation();toggleWish()" aria-label="Save to Wishlist">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                </button>
                ${multiImg ? `
                <button class="g-arrow prev" id="gPrev" onclick="event.stopPropagation();navGallery(-1)" aria-label="Previous image">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11.5 3L5 9.5L11.5 16"/></svg>
                </button>
                <button class="g-arrow next" id="gNext" onclick="event.stopPropagation();navGallery(1)" aria-label="Next image">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7.5 3L14 9.5L7.5 16"/></svg>
                </button>
                <div class="g-dots" id="gdots">${dotsHtml}</div><div class="g-counter" id="gctr">1 / ${P.images.length}</div>` : ''}
            </div>
        </div>
        <div class="p-body fu d1">
            <div class="price-line">
                <div class="price">${priceDisplay}</div>
                <div class="price-currency">USD</div>
            </div>
            <h1 class="p-name">${escapeHtml(P.name)}</h1>
            <div class="meta-line">
                <span class="meta-chip ${stockCls}">${stockLabel}</span>
            </div>
        </div>
        <hr class="divider">
        <div class="opts fu d2">
            <div class="opt-row">
                <div class="opt-label">Color <span class="opt-selected" id="colorLabel"></span></div>
                <div class="color-row" id="colorSwatches">${colorHtml}</div>
            </div>
            <div class="opt-row">
                <div class="opt-label">Size <span class="opt-selected" id="sizeLabel"></span></div>
                <div class="size-row" id="sizePills">${sizeHtml}</div>
            </div>
        </div>
        <hr class="divider">
        <div class="desc-section fu d3">
            <p class="sec-title">Details</p>
            <p class="desc-text">${escapeHtml(P.desc)}</p>
            ${specsHtml ? `<div class="specs">${specsHtml}</div>` : ''}
        </div>
        <div style="height:14px"></div>`;

    /* Sheet — price ตรงๆ ไม่หาร */
    document.getElementById('sheetThumb').src = P.images[0];
    document.getElementById('sheetPrice').innerText = `${fmtUSD(P.price)} USD`;
    document.getElementById('colorChips').innerHTML = P.colors.map((c,i) =>
        `<div class="sh-chip" data-idx="${i}" onclick="pickColorSheet(this,${i})">${escapeHtml(c.name)}</div>`).join('');
    document.getElementById('sizeChips').innerHTML  = P.sizes.map(s =>
        `<div class="sh-chip" data-size="${s}" onclick="pickSizeSheet(this,'${s}')">${s}</div>`).join('');

    document.getElementById('fgTrack').innerHTML = fgHtml;
    document.getElementById('actionBar').style.display = 'flex';
    setupSwipe(); updateSlider();
}

/* ─── PICK COLOR / SIZE ─── */
function pickColor(el, idx) {
    document.querySelectorAll('#colorSwatches .c-swatch').forEach(d => d.classList.remove('on'));
    el.classList.add('on'); selColor = P.colors[idx].name;
    document.getElementById('colorLabel').innerText = selColor;
    document.querySelectorAll('#colorChips .sh-chip').forEach((c,i) => c.classList.toggle('on', i===idx));
}
function pickSize(el, val) {
    document.querySelectorAll('#sizePills .s-pill').forEach(d => d.classList.remove('on'));
    el.classList.add('on'); selSize = val;
    document.getElementById('sizeLabel').innerText = val;
    document.querySelectorAll('#sizeChips .sh-chip').forEach(c => c.classList.toggle('on', c.dataset.size===val));
}
function pickColorSheet(el, idx) {
    document.querySelectorAll('#colorChips .sh-chip').forEach(c => c.classList.remove('on'));
    el.classList.add('on'); selColor = P.colors[idx].name;
    document.querySelectorAll('#colorSwatches .c-swatch').forEach((d,i) => d.classList.toggle('on', i===idx));
    const lbl = document.getElementById('colorLabel'); if (lbl) lbl.innerText = selColor;
}
function pickSizeSheet(el, val) {
    document.querySelectorAll('#sizeChips .sh-chip').forEach(c => c.classList.remove('on'));
    el.classList.add('on'); selSize = val;
    document.querySelectorAll('#sizePills .s-pill').forEach(d => d.classList.toggle('on', d.dataset.size===val));
    const lbl = document.getElementById('sizeLabel'); if (lbl) lbl.innerText = val;
}

/* ─── QTY ─── */
function changeQty(d) { qty = Math.max(1, Math.min(10, qty+d)); document.getElementById('qtyVal').innerText = qty; }

/* ─── SHEET ─── */
function openSheet() {
    setConfirm('idle');
    document.getElementById('mask').style.display = 'block';
    requestAnimationFrame(() => {
        document.getElementById('mask').classList.add('on');
        document.getElementById('sheet').classList.add('on');
    });
}
function hideSheet() {
    document.getElementById('sheet').classList.remove('on');
    document.getElementById('mask').classList.remove('on');
    setTimeout(() => document.getElementById('mask').style.display = 'none', 380);
}

/* ─── CONFIRM ─── */
function handleConfirm() {
    if (P.colors.length && !selColor) { showToast('warn','Select a color','Choose one of the options above'); return; }
    if (P.sizes.length  && !selSize)  { showToast('warn','Select a size','Choose your preferred size'); return; }
    setConfirm('loading');
    setTimeout(() => {
        /* price เป็น USD แล้ว — เก็บตรงๆ */
        saveCart({ id:PRODUCT_ID, name:P.name, price:P.price, image:P.images[0], color:selColor||'', size:selSize||'', quantity:qty });
        updateBadge();
        hideSheet();
        setTimeout(() => setConfirm('idle'), 400);
        showToast('ok','Added to cart', P.name.split(' ').slice(0,3).join(' ') + ' · Qty ' + qty);
    }, 680);
}

function setConfirm(state) {
    const btn = document.getElementById('confirmBtn');
    btn.className = `confirm-btn ${state}`;
    const SVG = {
        idle:'',
        loading:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>`,
        success:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`
    };
    const txt = { idle:'CONFIRM ORDER', loading:'ADDING', success:'ADDED TO CART' };
    btn.innerHTML = `${SVG[state]||''}<span>${txt[state]}</span>`;
    if (state === 'loading') { const s = btn.querySelector('svg'); if (s) s.style.animation='spin .8s linear infinite'; }
}

/* ─── CART STORAGE ─── */
function saveCart(item) {
    Cart.add(item); // sync localStorage + server (ถ้า login)
}
function updateBadge() {
    const n = Cart.count();
    const b = document.getElementById('cartBadge');
    b.innerText = n > 99 ? '99+' : n;
    b.style.display = n > 0 ? 'flex' : 'none';
}

/* ─── SLIDER ─── */
function updateSlider() {
    document.getElementById('gtrack').style.transform = `translateX(${-imgIdx*100}%)`;
    const ctr=document.getElementById('gctr'); if(ctr) ctr.innerText=`${imgIdx+1} / ${P.images.length}`;
    document.querySelectorAll('#gdots .g-dot').forEach((d,i) => d.classList.toggle('on', i===imgIdx));
    const ft=document.getElementById('fgTrack'); if(ft) ft.style.transform=`translateX(${-imgIdx*100}%)`;
    const fc=document.getElementById('fgCount'); if(fc) fc.innerText=`${imgIdx+1} / ${P.images.length}`;
    const prevBtn=document.getElementById('gPrev'); if(prevBtn) prevBtn.disabled = imgIdx<=0;
    const nextBtn=document.getElementById('gNext'); if(nextBtn) nextBtn.disabled = imgIdx>=P.images.length-1;
}

/* Desktop arrow-click navigation (swipe still handles touch — see setupSwipe) */
function navGallery(dir) {
    const next = imgIdx + dir;
    if (next < 0 || next > P.images.length - 1) return;
    imgIdx = next;
    updateSlider();
}
function setupSwipe() {
    let sx=0,sy=0;
    const vp=document.getElementById('gvp'); if(!vp) return;
    vp.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
    vp.addEventListener('touchend',e=>{
        const dx=sx-e.changedTouches[0].clientX,dy=sy-e.changedTouches[0].clientY;
        if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>36){
            if(dx>0&&imgIdx<P.images.length-1)imgIdx++;
            else if(dx<0&&imgIdx>0)imgIdx--;
            updateSlider();
        }
    },{passive:true});
}

/* ─── FULLSCREEN ─── */
function openFg(i) {
    imgIdx=i; updateSlider(); document.getElementById('fgView').style.display='flex';
    let sx=0; const ft=document.getElementById('fgTrack');
    ft.ontouchstart=e=>{sx=e.touches[0].clientX;};
    ft.ontouchend=e=>{
        const dx=sx-e.changedTouches[0].clientX;
        if(Math.abs(dx)>36){if(dx>0&&imgIdx<P.images.length-1)imgIdx++;else if(dx<0&&imgIdx>0)imgIdx--;updateSlider();}
    };
}
function closeFg(){document.getElementById('fgView').style.display='none';}

/* ─── TOAST ─── */
const SVG_CHECK=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
const SVG_WARN=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`;
let _tt;
function showToast(type,title,sub){
    const wrap=document.getElementById('toastIconWrap');
    wrap.className=`toast-icon-wrap ${type==='warn'?'warn':'success'}`;
    wrap.innerHTML=type==='warn'?SVG_WARN:SVG_CHECK;
    document.getElementById('toastTitle').innerText=title;
    document.getElementById('toastSub').innerText=sub||'';
    const t=document.getElementById('toast'); t.classList.add('on');
    clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('on'),2800);
}

window.onload = init;
</script>
</body>
</html>
